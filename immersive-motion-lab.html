<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Immersive Motion Lab</title>
  <style>
    :root{--bg:#0b1020;--panel:#121a31;--line:#2b3a64;--txt:#eef3ff;--muted:#9ba9ce;--accent:#7e71ff}
    *{box-sizing:border-box} body{margin:0;padding:16px;font-family:Inter,system-ui;background:radial-gradient(circle at 20% 0,#1b2550 0,#090d1b 45%);color:var(--txt)}
    .wrap{max-width:1100px;margin:0 auto;display:grid;gap:14px;grid-template-columns:340px 1fr}
    .card{background:linear-gradient(180deg,var(--panel),#0f162b);border:1px solid var(--line);border-radius:16px;padding:14px}
    h1{margin:0 0 6px;font-size:20px}.sub{margin:0 0 12px;font-size:13px;color:var(--muted)}
    .stack{display:grid;gap:8px}.btn,input,select{width:100%;padding:11px;border-radius:11px;border:1px solid #33456f;background:#1a2441;color:var(--txt);font:inherit}
    .btn{cursor:pointer;font-weight:700}.btn.primary{background:linear-gradient(180deg,#8377ff,#6658ef);border-color:#9389ff}.btn:disabled{opacity:.55;cursor:not-allowed}
    .status{font-size:12px;color:#c8d4f3;background:#101933;border:1px solid #314267;border-radius:10px;padding:10px;min-height:42px}
    .inline{display:none;gap:8px;margin-top:8px}.inline.show{display:grid}
    .viewer{min-height:560px;display:grid;place-items:center;border-radius:16px;overflow:hidden;border:1px solid var(--line);background:#040712;position:relative}
    canvas{display:block;width:100%;height:100%;max-height:80vh;object-fit:contain;background:#03050d}
    .hint{position:absolute;left:12px;bottom:12px;font-size:12px;color:#d3ddff;background:rgba(10,18,40,.65);padding:6px 10px;border-radius:999px;border:1px solid rgba(140,160,220,.35)}
    @media (max-width:980px){.wrap{grid-template-columns:1fr}.viewer{min-height:420px}}
  </style>
</head>
<body>
<div class="wrap">
  <section class="card">
    <h1>Immersive Motion Lab</h1>
    <p class="sub"><b>Upload image → it moves automatically.</b> Then tweak if you want.</p>

    <div class="stack">
      <input id="fileInput" type="file" accept="image/*" />
      <button id="btnExport" class="btn primary" disabled>Export 8s Loop</button>
      <div class="status" id="status">Step 1: Upload an image.</div>

      <div id="inlineControls" class="inline">
        <label>Motion Preset</label>
        <select id="preset">
          <option value="subtle" selected>Subtle</option>
          <option value="cinematic">Cinematic</option>
          <option value="deep">Deep</option>
        </select>

        <label>Motion Amount</label>
        <input id="amount" type="range" min="0.5" max="2" step="0.05" value="1" />

        <label>Depth Blur (optional)</label>
        <input id="depthBlur" type="range" min="0" max="2" step="0.1" value="0.7" />

        <label>Invert Depth (optional)</label>
        <select id="invertDepth">
          <option value="false" selected>No</option>
          <option value="true">Yes</option>
        </select>

        <button id="btnRegen" class="btn">Rebuild Depth</button>
      </div>
    </div>
  </section>

  <section class="card viewer">
    <canvas id="view" width="1280" height="1280"></canvas>
    <div class="hint">Preview auto-plays after upload</div>
  </section>
</div>

<script>
const fileInput = document.getElementById('fileInput');
const btnExport = document.getElementById('btnExport');
const btnRegen = document.getElementById('btnRegen');
const statusEl = document.getElementById('status');
const inlineControls = document.getElementById('inlineControls');
const preset = document.getElementById('preset');
const amount = document.getElementById('amount');
const depthBlur = document.getElementById('depthBlur');
const invertDepth = document.getElementById('invertDepth');

const canvas = document.getElementById('view');
const ctx = canvas.getContext('2d', {alpha:false});

let sourceImg = null;
let sourceData = null;
let depthData = null;
let hasDepth = false;
let ready = false;
let startTime = performance.now();

const styleMap = {
  subtle: {ampX:10, ampY:7, speed:.7, strength:1.0},
  cinematic: {ampX:16, ampY:11, speed:.9, strength:1.25},
  deep: {ampX:22, ampY:15, speed:1.0, strength:1.5}
};

const setStatus = (t)=> statusEl.textContent = t;

function fit(sw, sh, dw, dh){ const sr=sw/sh, dr=dw/dh; let w,h; if(sr>dr){w=dw;h=Math.round(dw/sr)} else {h=dh;w=Math.round(dh*sr)}; return {x:Math.round((dw-w)/2),y:Math.round((dh-h)/2),w,h}; }
function imgData(img){ const c=document.createElement('canvas'); c.width=img.width; c.height=img.height; const x=c.getContext('2d'); x.drawImage(img,0,0); return x.getImageData(0,0,c.width,c.height); }
async function toDataURL(file){ return await new Promise((res,rej)=>{const r=new FileReader(); r.onload=()=>res(String(r.result)); r.onerror=rej; r.readAsDataURL(file);}); }
async function loadImg(src){ return await new Promise((res,rej)=>{ const i=new Image(); i.onload=()=>res(i); i.onerror=rej; i.src=src; }); }

function drawStill(){
  ctx.fillStyle='#040711'; ctx.fillRect(0,0,canvas.width,canvas.height);
  if(!sourceImg) return;
  const b=fit(sourceImg.width,sourceImg.height,canvas.width,canvas.height);
  ctx.drawImage(sourceImg,b.x,b.y,b.w,b.h);
}

function render(now, forcedPhase=null){
  if(!sourceData){ drawStill(); return; }
  const s = styleMap[preset.value] || styleMap.subtle;
  const mult = Number(amount.value || 1);
  const t = forcedPhase ?? (((now-startTime)/1000) * s.speed);
  const camX = Math.sin(t*Math.PI*2) * s.ampX * mult;
  const camY = Math.sin(t*Math.PI*4) * s.ampY * mult * .65;

  const w=sourceData.width,h=sourceData.height;
  const out=ctx.createImageData(w,h);
  const sp=sourceData.data, op=out.data;

  for(let y=0;y<h;y++){
    for(let x=0;x<w;x++){
      const i=(y*w+x)*4;

      // If depth not ready yet, use lightweight center-distance pseudo-depth for immediate motion preview.
      let d;
      if(hasDepth && depthData){ d = depthData.data[i]/255; }
      else {
        const nx=(x/w)-0.5, ny=(y/h)-0.5;
        const r=Math.min(1, Math.sqrt(nx*nx+ny*ny)*1.4);
        d=1-r; // center feels nearer
      }

      const p=(d-0.5)*2*s.strength;
      const sx=Math.max(0,Math.min(w-1,Math.round(x+camX*p)));
      const sy=Math.max(0,Math.min(h-1,Math.round(y+camY*p)));
      const si=(sy*w+sx)*4;
      op[i]=sp[si]; op[i+1]=sp[si+1]; op[i+2]=sp[si+2]; op[i+3]=255;
    }
  }

  const off=document.createElement('canvas'); off.width=w; off.height=h; off.getContext('2d').putImageData(out,0,0);
  ctx.fillStyle='#02040b'; ctx.fillRect(0,0,canvas.width,canvas.height);
  const b=fit(w,h,canvas.width,canvas.height);
  ctx.drawImage(off,b.x,b.y,b.w,b.h);
}

async function buildDepth(){
  const file=fileInput.files?.[0];
  if(!file || !sourceImg) return;
  try{
    setStatus('Building smart depth map…');
    const imageDataUrl = await toDataURL(file);
    const resp = await fetch('/api/depth/estimate', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ imageDataUrl, invert: invertDepth.value==='true', blur: Number(depthBlur.value) })
    });
    const json=await resp.json();
    if(!json.ok) throw new Error(json.error || 'Depth failed');
    const dImg = await loadImg(json.depthDataUrl);
    depthData = imgData(dImg);
    hasDepth = true;
    ready = true;
    btnExport.disabled = false;
    setStatus('Done. Motion preview is ready. You can export now.');
  }catch(e){
    console.error(e);
    // keep preview working with pseudo-depth even if model fails
    hasDepth = false;
    ready = true;
    btnExport.disabled = false;
    setStatus('Preview is running (basic depth). Export is still available.');
  }
}

fileInput.addEventListener('change', async ()=>{
  const file=fileInput.files?.[0];
  if(!file) return;
  setStatus('Loading image…');
  try{
    const url=await toDataURL(file);
    sourceImg=await loadImg(url);
    sourceData=imgData(sourceImg);
    depthData=null; hasDepth=false; ready=true;
    inlineControls.classList.add('show');
    btnExport.disabled=false; // allow export immediately
    startTime=performance.now();
    setStatus('Preview started. Enhancing with smart depth in background…');
    buildDepth(); // async enhancement
  }catch(e){
    console.error(e);
    setStatus('Could not load image. Try another one.');
  }
});

btnRegen.addEventListener('click', ()=> buildDepth());
preset.addEventListener('change', ()=> startTime=performance.now());
amount.addEventListener('input', ()=> startTime=performance.now());

btnExport.addEventListener('click', async ()=>{
  if(!ready || !sourceData) return;
  btnExport.disabled=true;
  setStatus('Exporting 8s loop…');
  const fps=30, sec=8, total=fps*sec;
  const stream=canvas.captureStream(fps);
  const chunks=[];
  const rec=new MediaRecorder(stream,{mimeType:'video/webm;codecs=vp9'});
  rec.ondataavailable=(e)=>{ if(e.data?.size) chunks.push(e.data); };
  rec.start();
  for(let f=0; f<total; f++){
    render(performance.now(), f/total);
    await new Promise(r=>setTimeout(r,1000/fps));
  }
  rec.stop();
  await new Promise(r=>rec.onstop=r);
  const blob=new Blob(chunks,{type:'video/webm'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`immersive-loop-${new Date().toISOString().replace(/[:.]/g,'-')}.webm`;
  a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),1000);
  btnExport.disabled=false;
  setStatus('Export complete.');
});

(function loop(now){ render(now); requestAnimationFrame(loop); })(performance.now());
drawStill();
</script>
</body>
</html>
