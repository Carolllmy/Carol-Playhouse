<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Story Time - Text Storyboard</title>
  <style>
    :root {
      --bg: #f7f5ef;
      --ink: #1f1f1f;
      --paper: #fff;
      --accent: #ff7a59;
      --soft: #e9e3d8;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: var(--bg);
      color: var(--ink);
    }
    .app { display: grid; grid-template-columns: 380px 1fr; min-height: 100vh; }
    .left {
      background: #fffdf8;
      border-right: 2px solid #e8e2d7;
      padding: 16px;
      overflow: auto;
    }
    .right { padding: 16px; overflow: auto; }
    h1 { margin: 0 0 8px; font-size: 24px; }
    h2 { margin: 18px 0 10px; font-size: 16px; }
    .subtitle { color: #666; font-size: 13px; margin-bottom: 12px; }
    .card {
      border: 2px solid var(--soft);
      border-radius: 14px;
      padding: 12px;
      background: var(--paper);
      margin-bottom: 12px;
    }
    label { font-size: 12px; font-weight: 700; display: block; margin-bottom: 6px; }
    input, textarea {
      width: 100%;
      border: 2px solid #e7e0d3;
      border-radius: 10px;
      padding: 10px;
      font: inherit;
      background: #fff;
    }
    textarea { resize: vertical; min-height: 88px; }
    .btn {
      border: 0;
      border-radius: 10px;
      background: var(--ink);
      color: #fff;
      padding: 10px 12px;
      font-weight: 700;
      cursor: pointer;
      margin-right: 8px;
      margin-top: 8px;
    }
    .btn.alt { background: #6d6556; }
    .btn.accent { background: var(--accent); }
    .small { font-size: 12px; color: #666; }

    .character-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; }
    .character {
      border: 2px solid #e5decf;
      border-radius: 10px;
      padding: 8px;
      background: #fff;
      font-size: 12px;
    }
    .character img { width: 100%; height: 90px; object-fit: contain; background: #fff; }
    .character .meta { color: #666; font-size: 11px; margin-top: 4px; }
    .character .actions { margin-top: 6px; display: flex; justify-content: flex-end; }
    .char-delete {
      border: 1px solid #d7cdb9;
      background: #fff7f4;
      color: #7a3b2e;
      border-radius: 8px;
      padding: 4px 8px;
      font-size: 11px;
      cursor: pointer;
      font-weight: 700;
    }

    .toolbar { display: flex; justify-content: space-between; align-items: center; gap: 10px; margin-bottom: 10px; }
    .board { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 12px; }
    .scene {
      background: #fff;
      border: 2px solid #d8d1c2;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 6px 16px rgba(0,0,0,.06);
    }
    .scene-canvas { width: 100%; height: 180px; display: block; background: #fdfcf9; }
    .scene-body { padding: 10px; }
    .scene-title { font-size: 13px; font-weight: 800; margin-bottom: 4px; }
    .scene-text { font-size: 12px; color: #444; min-height: 36px; }
    .tag { font-size: 11px; background: #f4efe4; border: 1px solid #daceb7; border-radius: 999px; padding: 3px 8px; margin-right: 6px; }

    @media (max-width: 900px) {
      .app { grid-template-columns: 1fr; }
      .left { border-right: 0; border-bottom: 2px solid #e8e2d7; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="left">
      <h1>Story Time 🎬</h1>
      <div class="subtitle">All English. Text scenes + auto-generated expressive storyboard characters.</div>

      <section class="card">
        <h2>1) Generate Character from Natural Language</h2>
        <label for="charName">Character name</label>
        <input id="charName" placeholder="e.g. Bonnie" />
        <label for="charPrompt" style="margin-top:8px">Character prompt</label>
        <textarea id="charPrompt" placeholder="Example: A 7.5 year old girl with middle length hair and a bang, huge doggy style eyes, cute vivid and goofy."></textarea>
        <div>
          <button id="generateCharacter" class="btn accent">Generate character</button>
        </div>
        <div class="small" style="margin-top:8px">Style is always expressive storyboard sketch (animation pre-vis feel).</div>
        <div class="small" id="charStatus" style="margin-top:6px">Ready to generate.</div>
        <div id="characterList" class="character-grid" style="margin-top:10px"></div>
      </section>

      <section class="card">
        <h2>2) Add Scenes by Text</h2>
        <label for="sceneText">Scene description</label>
        <textarea id="sceneText" placeholder="Example: Medium shot. Bonnie runs into a train station and finds a glowing mystery box."></textarea>
        <div>
          <button id="addScene" class="btn accent">Add scene</button>
        </div>
        <div class="small" style="margin-top:8px;">Text-only mode.</div>
      </section>
    </aside>

    <main class="right">
      <div class="toolbar">
        <div>
          <strong>Storyboard</strong>
          <span class="small" id="sceneCount">0 scenes</span>
        </div>
        <div>
          <button id="exportTxt" class="btn alt">Export text</button>
          <button id="clearScenes" class="btn">Clear all scenes</button>
        </div>
      </div>
      <section id="board" class="board"></section>
    </main>
  </div>

<script>
(() => {
  const charName = document.getElementById('charName');
  const charPrompt = document.getElementById('charPrompt');
  const generateCharacterBtn = document.getElementById('generateCharacter');
  const charStatus = document.getElementById('charStatus');
  const characterList = document.getElementById('characterList');
  const sceneText = document.getElementById('sceneText');
  const addSceneBtn = document.getElementById('addScene');
  const board = document.getElementById('board');
  const sceneCount = document.getElementById('sceneCount');
  const clearScenesBtn = document.getElementById('clearScenes');
  const exportTxtBtn = document.getElementById('exportTxt');

  const state = {
    characters: JSON.parse(localStorage.getItem('storytime.characters') || '[]'),
    scenes: JSON.parse(localStorage.getItem('storytime.scenes') || '[]')
  };

  function saveState() {
    localStorage.setItem('storytime.characters', JSON.stringify(state.characters));
    localStorage.setItem('storytime.scenes', JSON.stringify(state.scenes));
  }

  function hashCode(str) {
    let h = 2166136261;
    for (let i = 0; i < str.length; i++) {
      h ^= str.charCodeAt(i);
      h += (h << 1) + (h << 4) + (h << 7) + (h << 8) + (h << 24);
    }
    return Math.abs(h >>> 0);
  }

  function makeId() {
    if (window.crypto && crypto.randomUUID) return crypto.randomUUID();
    return 'id-' + Date.now() + '-' + Math.floor(Math.random() * 1e6);
  }

  function uniqueCharacterName(base) {
    const clean = (base || '').trim() || `Character ${state.characters.length + 1}`;
    if (!state.characters.some(c => c.name.toLowerCase() === clean.toLowerCase())) return clean;
    let n = 2;
    while (state.characters.some(c => c.name.toLowerCase() === `${clean} ${n}`.toLowerCase())) n++;
    return `${clean} ${n}`;
  }

  function parseTraits(prompt) {
    const p = prompt.toLowerCase();
    return {
      isChild: /(kid|child|young|7|8|9|girl|boy)/.test(p),
      bangs: /(bang|fringe)/.test(p),
      longHair: /(long hair|waist|very long)/.test(p),
      midHair: /(middle length|medium hair|mid length)/.test(p),
      shortHair: /(short hair|pixie)/.test(p),
      bigEyes: /(big eye|huge eye|doggy eye|anime eye)/.test(p),
      goofy: /(goofy|funny|silly|playful)/.test(p),
      cute: /(cute|adorable|sweet)/.test(p),
      calm: /(calm|quiet|serious)/.test(p),
      energetic: /(energetic|active|vivid|lively)/.test(p)
    };
  }

  function drawSketchCharacter(prompt, name) {
    const traits = parseTraits(prompt);
    const seed = hashCode(name + '|' + prompt);
    const rand = (n = 1) => ((Math.sin(seed * (n * 0.73)) + 1) / 2);

    const canvas = document.createElement('canvas');
    canvas.width = 360;
    canvas.height = 240;
    const c = canvas.getContext('2d');

    c.clearRect(0, 0, canvas.width, canvas.height);
    c.fillStyle = '#ffffff';
    c.fillRect(0, 0, canvas.width, canvas.height);

    const x = 180;
    const y = 146;
    const headR = traits.isChild ? 44 : 36;
    const eyeScale = traits.bigEyes ? 1.35 : 1;
    const bodyW = traits.isChild ? 64 : 72;
    const bodyH = traits.isChild ? 56 : 64;

    c.strokeStyle = '#1f1f1f';
    c.lineCap = 'round';
    c.lineJoin = 'round';

    const jitter = (v, amt = 1) => v + (Math.random() - 0.5) * amt;

    const sketchStroke = (fn, passes = 4, wobble = 2.2, alpha = 0.72) => {
      for (let p = 0; p < passes; p++) {
        c.save();
        c.globalAlpha = alpha * (0.82 + Math.random() * 0.35);
        c.translate((Math.random() - 0.5) * wobble, (Math.random() - 0.5) * wobble);
        c.rotate((Math.random() - 0.5) * 0.018);
        c.lineWidth = 1.1 + Math.random() * 1.6;
        fn();
        c.restore();
      }
      c.globalAlpha = 1;
    };

    const roughCurve = (pts, passes = 3) => {
      for (let p = 0; p < passes; p++) {
        c.beginPath();
        c.moveTo(jitter(pts[0][0], 1.4), jitter(pts[0][1], 1.4));
        for (let i = 1; i < pts.length; i++) {
          const prev = pts[i - 1];
          const curr = pts[i];
          const mx = (prev[0] + curr[0]) / 2;
          const my = (prev[1] + curr[1]) / 2;
          c.quadraticCurveTo(jitter(prev[0], 1.8), jitter(prev[1], 1.8), jitter(mx, 1.2), jitter(my, 1.2));
        }
        c.stroke();
      }
    };

    // hair shape
    const hairH = traits.longHair ? 92 : traits.midHair ? 68 : traits.shortHair ? 38 : 58;
    sketchStroke(() => {
      roughCurve([
        [x - (headR + 18), y - 58],
        [x - headR * 0.7, y - (92 + hairH * 0.08)],
        [x, y - (102 + hairH * 0.06)],
        [x + headR * 0.7, y - (90 + hairH * 0.08)],
        [x + (headR + 18), y - 56],
        [x + (headR + 14), y + 4],
        [x - (headR + 14), y + 4],
        [x - (headR + 18), y - 58]
      ], 2);
    }, 3, 2.6, 0.62);

    // bangs
    if (traits.bangs) {
      sketchStroke(() => {
        roughCurve([
          [x - 34, y - 90], [x - 18, y - 68], [x - 2, y - 84], [x + 14, y - 66], [x + 34, y - 90]
        ], 2);
      }, 3, 1.4, 0.75);
    }

    // head + jaw
    sketchStroke(() => {
      roughCurve([
        [x - headR, y - 50], [x - headR * 0.7, y - 82], [x, y - 92], [x + headR * 0.7, y - 80], [x + headR, y - 50],
        [x + headR * 0.55, y - 10], [x, y + 10], [x - headR * 0.55, y - 10], [x - headR, y - 50]
      ], 3);
    }, 4, 2.2, 0.7);

    // eyes (expressive)
    const eyeR = (traits.isChild ? 10 : 8) * eyeScale;
    sketchStroke(() => {
      c.beginPath();
      c.ellipse(x - 16, y - 56, eyeR, eyeR * 0.95, 0, 0, Math.PI * 2);
      c.ellipse(x + 16, y - 56, eyeR, eyeR * 0.95, 0, 0, Math.PI * 2);
      c.stroke();
    }, 4, 1.2);

    c.fillStyle = '#1f1f1f';
    c.beginPath();
    c.arc(x - 13, y - 54, 3.4, 0, Math.PI * 2);
    c.arc(x + 13, y - 54, 3.4, 0, Math.PI * 2);
    c.fill();

    // brows + blush lines
    sketchStroke(() => {
      c.beginPath();
      c.moveTo(x - 28, y - 70); c.lineTo(x - 8, y - 72);
      c.moveTo(x + 8, y - 72); c.lineTo(x + 28, y - 69);
      c.stroke();
    }, 2, 1);

    if (traits.cute || traits.isChild) {
      c.lineWidth = 1.4;
      c.beginPath();
      c.moveTo(x - 30, y - 40); c.lineTo(x - 22, y - 38);
      c.moveTo(x + 22, y - 38); c.lineTo(x + 30, y - 40);
      c.stroke();
    }

    // mouth/expression
    sketchStroke(() => {
      c.beginPath();
      if (traits.goofy || traits.energetic) {
        c.ellipse(x, y - 30, 12, 8, 0, 0.1, Math.PI - 0.1);
      } else if (traits.calm) {
        c.moveTo(x - 10, y - 30); c.lineTo(x + 10, y - 30);
      } else {
        c.arc(x, y - 30, 10, 0.2, Math.PI - 0.2);
      }
      c.stroke();
    }, 3, 1);

    // neck + torso (not stickman)
    sketchStroke(() => {
      c.beginPath();
      c.moveTo(x - 8, y - 10); c.lineTo(x - 8, y + 2);
      c.moveTo(x + 8, y - 10); c.lineTo(x + 8, y + 2);
      c.stroke();

      c.beginPath();
      c.moveTo(x - bodyW * 0.45, y + 8);
      c.quadraticCurveTo(x, y - 8, x + bodyW * 0.45, y + 8);
      c.lineTo(x + bodyW * 0.35, y + bodyH);
      c.quadraticCurveTo(x, y + bodyH + 10, x - bodyW * 0.35, y + bodyH);
      c.closePath();
      c.stroke();
    }, 4, 1.8);

    // arms pose
    sketchStroke(() => {
      c.beginPath();
      c.moveTo(x - bodyW * 0.35, y + 20);
      c.quadraticCurveTo(x - 62, y + 18, x - 74, y + 44);
      c.moveTo(x + bodyW * 0.35, y + 20);
      c.quadraticCurveTo(x + 62, y + 18, x + 74, y + 42);
      c.stroke();
    }, 3, 1.5);

    // optional tiny motion accents near character only
    if (traits.goofy || traits.energetic) {
      for (let i = 0; i < 3; i++) {
        const ax = x - 62 + i * 62;
        const ay = y - 104 + rand(i + 5) * 10;
        c.beginPath();
        c.moveTo(ax - 4, ay); c.lineTo(ax + 4, ay);
        c.moveTo(ax, ay - 4); c.lineTo(ax, ay + 4);
        c.stroke();
      }
    }

    // graphite-like smudge/hatching near character only
    c.save();
    c.globalAlpha = 0.18;
    c.strokeStyle = '#2a2a2a';
    for (let i = 0; i < 42; i++) {
      const sx = x - 90 + Math.random() * 180;
      const sy = y - 120 + Math.random() * 150;
      c.lineWidth = 0.6 + Math.random() * 0.8;
      c.beginPath();
      c.moveTo(sx, sy);
      c.lineTo(sx + (Math.random() - 0.5) * 16, sy + (Math.random() - 0.5) * 16);
      c.stroke();
    }
    c.restore();

    // name only, no scene/background elements
    c.font = 'bold 15px Inter, sans-serif';
    c.fillStyle = '#1f1f1f';
    c.fillText(name, 12, canvas.height - 10);

    return canvas.toDataURL('image/png');
  }

  generateCharacterBtn.addEventListener('click', async () => {
    const prompt = charPrompt.value.trim();
    if (!prompt) {
      charStatus.textContent = 'Please describe the character first.';
      return;
    }

    const name = uniqueCharacterName(charName.value);
    charStatus.textContent = `Generating ${name}...`;
    generateCharacterBtn.disabled = true;

    let avatar = '';
    try {
      const res = await fetch('/api/story/character-generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, prompt })
      });
      const data = await res.json();
      if (!res.ok || !data?.imagePath) throw new Error(data?.error || 'Generation failed');
      avatar = data.imagePath;
    } catch {
      // fallback to local sketch if API fails
      avatar = drawSketchCharacter(prompt, name);
    } finally {
      generateCharacterBtn.disabled = false;
    }

    state.characters.push({ id: makeId(), name, prompt, avatar });

    saveState();
    renderCharacters();
    charName.value = '';
    charPrompt.value = '';
    charStatus.textContent = `Generated ${name}.`;

    requestAnimationFrame(() => {
      const last = characterList.lastElementChild;
      last?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    });
  });

  function renderCharacters() {
    characterList.innerHTML = '';
    if (!state.characters.length) {
      characterList.innerHTML = '<div class="small">No characters yet. Generate one above.</div>';
      return;
    }
    state.characters.forEach(c => {
      const el = document.createElement('div');
      el.className = 'character';
      el.innerHTML = `<img src="${c.avatar}" alt="${c.name}"/><div style="margin-top:6px;font-weight:700">${c.name}</div><div class="meta">${c.prompt.slice(0, 70)}${c.prompt.length > 70 ? '…' : ''}</div><div class="actions"><button class="char-delete" data-id="${c.id}">Delete</button></div>`;
      characterList.appendChild(el);
    });
  }

  characterList.addEventListener('click', (e) => {
    const btn = e.target.closest('.char-delete');
    if (!btn) return;
    const id = btn.getAttribute('data-id');
    const target = state.characters.find(c => c.id === id);
    if (!target) return;
    if (!confirm(`Delete ${target.name}?`)) return;
    state.characters = state.characters.filter(c => c.id !== id);
    saveState();
    renderCharacters();
    charStatus.textContent = `Deleted ${target.name}.`;
  });

  const avatarCache = new Map();

  function detectShotType(text) {
    const t = text.toLowerCase();
    if (/close-up|close up|cu|portrait|detail/.test(t)) return 'Close-up';
    if (/medium shot|medium|ms/.test(t)) return 'Medium shot';
    if (/wide shot|wide|long shot|establishing/.test(t)) return 'Wide shot';
    return 'Auto framing';
  }

  function parseSceneDirectives(text) {
    const t = text.toLowerCase();
    let emotion = 'neutral';
    if (/happy|smile|excited|joy|laugh/.test(t)) emotion = 'happy';
    if (/sad|cry|upset/.test(t)) emotion = 'sad';
    if (/angry|mad|furious/.test(t)) emotion = 'angry';
    if (/scared|afraid|shocked|surprised|wow/.test(t)) emotion = 'surprised';

    let action = 'idle';
    if (/run|running|dash|sprint/.test(t)) action = 'run';
    else if (/jump|hopping|leap/.test(t)) action = 'jump';
    else if (/point|show|look at/.test(t)) action = 'point';
    else if (/sit|sitting/.test(t)) action = 'sit';
    else if (/wave|waving/.test(t)) action = 'wave';

    return { emotion, action };
  }

  function extractCharacters(text) {
    const t = text.toLowerCase();
    return state.characters.filter(c => t.includes(c.name.toLowerCase()));
  }

  function addScene(rawText) {
    const text = rawText.trim();
    if (!text) return;
    const scene = {
      id: makeId(),
      index: state.scenes.length + 1,
      text,
      shot: detectShotType(text),
      chars: extractCharacters(text).map(c => ({ name: c.name, avatar: c.avatar, prompt: c.prompt }))
    };
    state.scenes.push(scene);
    saveState();
    renderScenes();
  }

  function getAvatarImage(src, onReady) {
    if (!src) return null;
    if (avatarCache.has(src)) return avatarCache.get(src);
    const img = new Image();
    img.onload = () => onReady?.();
    img.src = src;
    avatarCache.set(src, img);
    return img;
  }

  function drawStoryboardFrame(canvas, scene) {
    const c = canvas.getContext('2d');
    const w = canvas.width, h = canvas.height;

    // keep scene background empty; only characters should appear
    c.clearRect(0, 0, w, h);
    c.fillStyle = '#ffffff';
    c.fillRect(0, 0, w, h);

    const directives = parseSceneDirectives(scene.text);
    const chars = scene.chars.length ? scene.chars : [{ name: 'Narrator' }];

    chars.slice(0, 3).forEach((ch, i) => {
      const x = w * (0.2 + i * 0.3);
      const y = h * (scene.shot === 'Close-up' ? 0.72 : 0.78);
      const scale = scene.shot === 'Close-up' ? 1.15 : scene.shot === 'Wide shot' ? 0.6 : 0.85;
      drawSceneCharacter(c, x, y, scale, ch, directives);
      c.fillStyle = '#111';
      c.font = '12px Inter, sans-serif';
      c.fillText(ch.name, x - 24, y + 18);
    });

    c.fillStyle = '#111';
    c.font = '12px Inter, sans-serif';
    c.fillText(`${scene.shot} • ${directives.action} • ${directives.emotion}`, 8, 16);
  }

  function drawSceneCharacter(c, x, y, s, ch, directives) {
    const action = directives.action;
    const emotion = directives.emotion;

    // body and pose
    c.strokeStyle = '#222';
    c.lineWidth = 2;
    c.lineCap = 'round';

    let lean = 0;
    if (action === 'run') lean = 6 * s;
    if (action === 'jump') lean = -2 * s;

    c.beginPath();
    c.moveTo(x - 10 * s, y - 16 * s);
    c.quadraticCurveTo(x + lean, y - 22 * s, x + 10 * s, y - 16 * s);
    c.lineTo(x + 8 * s, y + 14 * s);
    c.quadraticCurveTo(x + lean, y + 20 * s, x - 8 * s, y + 14 * s);
    c.closePath();
    c.stroke();

    // arms by action
    c.beginPath();
    if (action === 'run') {
      c.moveTo(x - 8 * s, y - 6 * s); c.lineTo(x - 22 * s, y + 6 * s);
      c.moveTo(x + 8 * s, y - 6 * s); c.lineTo(x + 18 * s, y - 16 * s);
    } else if (action === 'point') {
      c.moveTo(x - 8 * s, y - 6 * s); c.lineTo(x - 18 * s, y + 5 * s);
      c.moveTo(x + 8 * s, y - 6 * s); c.lineTo(x + 28 * s, y - 8 * s);
    } else if (action === 'wave') {
      c.moveTo(x - 8 * s, y - 6 * s); c.lineTo(x - 16 * s, y + 4 * s);
      c.moveTo(x + 8 * s, y - 6 * s); c.lineTo(x + 12 * s, y - 24 * s);
    } else {
      c.moveTo(x - 8 * s, y - 6 * s); c.lineTo(x - 18 * s, y + 5 * s);
      c.moveTo(x + 8 * s, y - 6 * s); c.lineTo(x + 18 * s, y + 5 * s);
    }
    c.stroke();

    // legs by action
    c.beginPath();
    if (action === 'run') {
      c.moveTo(x - 3 * s, y + 16 * s); c.lineTo(x - 16 * s, y + 30 * s);
      c.moveTo(x + 3 * s, y + 16 * s); c.lineTo(x + 18 * s, y + 24 * s);
    } else if (action === 'jump') {
      c.moveTo(x - 3 * s, y + 16 * s); c.lineTo(x - 14 * s, y + 24 * s);
      c.moveTo(x + 3 * s, y + 16 * s); c.lineTo(x + 14 * s, y + 24 * s);
    } else if (action === 'sit') {
      c.moveTo(x - 3 * s, y + 16 * s); c.lineTo(x - 12 * s, y + 20 * s);
      c.moveTo(x + 3 * s, y + 16 * s); c.lineTo(x + 10 * s, y + 19 * s);
    } else {
      c.moveTo(x - 3 * s, y + 16 * s); c.lineTo(x - 8 * s, y + 29 * s);
      c.moveTo(x + 3 * s, y + 16 * s); c.lineTo(x + 8 * s, y + 29 * s);
    }
    c.stroke();

    // head uses generated character thumbnail for sync
    const img = getAvatarImage(ch.avatar, () => drawStoryboardFrame(c.canvas, sceneFromCanvas(c.canvas)));
    c.save();
    c.beginPath();
    c.ellipse(x, y - 34 * s, 13 * s, 13 * s, 0, 0, Math.PI * 2);
    c.clip();
    if (img && img.complete) {
      c.drawImage(img, x - 14 * s, y - 48 * s, 28 * s, 28 * s);
    } else {
      c.fillStyle = '#fff';
      c.fillRect(x - 14 * s, y - 48 * s, 28 * s, 28 * s);
    }
    c.restore();

    // face/emotion overlay
    c.strokeStyle = '#222';
    c.lineWidth = 1.4;
    c.beginPath();
    if (emotion === 'happy') c.arc(x, y - 31 * s, 6 * s, 0.2, Math.PI - 0.2);
    else if (emotion === 'sad') c.arc(x, y - 25 * s, 6 * s, Math.PI + 0.2, Math.PI * 2 - 0.2);
    else if (emotion === 'angry') { c.moveTo(x - 7 * s, y - 40 * s); c.lineTo(x - 2 * s, y - 42 * s); c.moveTo(x + 2 * s, y - 42 * s); c.lineTo(x + 7 * s, y - 40 * s); }
    else if (emotion === 'surprised') c.ellipse(x, y - 30 * s, 2.5 * s, 3.5 * s, 0, 0, Math.PI * 2);
    else { c.moveTo(x - 5 * s, y - 30 * s); c.lineTo(x + 5 * s, y - 30 * s); }
    c.stroke();
  }

  function sceneFromCanvas(canvas) {
    const idx = Array.from(board.querySelectorAll('canvas')).indexOf(canvas);
    return state.scenes[idx] || state.scenes[0];
  }

  function renderScenes() {
    board.innerHTML = '';
    state.scenes.forEach(scene => {
      const card = document.createElement('article');
      card.className = 'scene';
      card.innerHTML = `
        <canvas class="scene-canvas" width="540" height="360"></canvas>
        <div class="scene-body">
          <div class="scene-title">Scene ${scene.index}</div>
          <div style="margin-bottom:6px"><span class="tag">${scene.shot}</span>${scene.chars.map(c => `<span class="tag">${c.name}</span>`).join('')}</div>
          <div class="scene-text">${scene.text}</div>
          <div class="actions"><button class="char-delete scene-delete" data-scene-id="${scene.id}">Delete scene</button></div>
        </div>
      `;
      const canvas = card.querySelector('canvas');
      drawStoryboardFrame(canvas, scene);
      board.appendChild(card);
    });
    sceneCount.textContent = `${state.scenes.length} scene${state.scenes.length === 1 ? '' : 's'}`;
  }

  addSceneBtn.addEventListener('click', () => {
    addScene(sceneText.value);
    sceneText.value = '';
  });

  board.addEventListener('click', (e) => {
    const btn = e.target.closest('.scene-delete');
    if (!btn) return;
    const id = btn.getAttribute('data-scene-id');
    const target = state.scenes.find(s => s.id === id);
    if (!target) return;
    if (!confirm(`Delete Scene ${target.index}?`)) return;
    state.scenes = state.scenes.filter(s => s.id !== id).map((s, i) => ({ ...s, index: i + 1 }));
    saveState();
    renderScenes();
  });

  clearScenesBtn.addEventListener('click', () => {
    if (!confirm('Clear all scenes?')) return;
    state.scenes = [];
    saveState();
    renderScenes();
  });

  exportTxtBtn.addEventListener('click', async () => {
    const out = state.scenes.map(s => `Scene ${s.index} | ${s.shot}\n${s.text}\nCharacters: ${s.chars.map(c => c.name).join(', ') || 'None'}\n`).join('\n');
    try {
      await navigator.clipboard.writeText(out || 'No scenes yet.');
      alert('Storyboard text copied!');
    } catch {
      alert('Copy failed.');
    }
  });

  // Text-only mode: voice input removed.

  renderCharacters();
  renderScenes();
})();
</script>
</body>
</html>
