<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Opposite — Choose The Wrong Answer</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #121214;
    --arrow-color: #FF2832;
    --accent: #96141E;
    --btn-fill: #232328;
    --btn-border: #32343C;
    --transition: 0.55s ease;
  }
  html, body {
    height: 100%; width: 100%; overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif;
    background: var(--bg);
    color: #fff;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  /* ── SCREENS ── */
  .screen { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.25s; }
  .screen.hidden { opacity: 0; pointer-events: none; }

  /* ── MENU ── */
  #menu {
    background: var(--bg);
    gap: 0;
  }
  .menu-title {
    font-size: clamp(42px, 12vw, 64px);
    font-weight: 900;
    letter-spacing: 12px;
    text-transform: uppercase;
    background: linear-gradient(180deg, #fff 0%, #ccc 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: none;
    line-height: 1;
    filter: drop-shadow(0 2px 20px rgba(200,30,30,0.5));
  }
  .menu-rule {
    height: 2px;
    background: var(--accent);
    width: 70%;
    margin: 14px auto 10px;
    transform-origin: center;
    animation: ruleExpand 0.6s 0.45s ease both;
  }
  @keyframes ruleExpand { from { transform: scaleX(0); } to { transform: scaleX(1); } }
  .menu-sub {
    font-size: 11px;
    letter-spacing: 3.5px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.45);
    margin-bottom: 48px;
  }
  .menu-arrows {
    display: flex;
    align-items: center;
    gap: 28px;
    margin-bottom: 56px;
  }
  .menu-arrow-up { font-size: 72px; color: var(--accent); animation: floatUp 1.5s ease-in-out infinite alternate; }
  .menu-equals { font-size: 42px; color: rgba(255,255,255,0.55); }
  .menu-arrow-down { font-size: 72px; color: rgba(255,255,255,0.72); animation: floatDown 1.6s ease-in-out infinite alternate; }
  @keyframes floatUp { from { transform: translateY(0); } to { transform: translateY(-8px); } }
  @keyframes floatDown { from { transform: translateY(0); } to { transform: translateY(8px); } }

  .btn-start {
    background: var(--accent);
    color: #000;
    font-size: 18px;
    font-weight: 900;
    letter-spacing: 8px;
    text-transform: uppercase;
    border: none;
    border-radius: 6px;
    padding: 20px 0;
    width: min(360px, 80vw);
    cursor: pointer;
    transition: transform 0.1s, opacity 0.1s;
  }
  .btn-start:active { transform: scale(0.96); opacity: 0.85; }
  .btn-trophy {
    position: absolute;
    top: max(60px, env(safe-area-inset-top, 20px) + 40px);
    left: 50%;
    transform: translateX(-50%);
    background: rgba(255,255,255,0.08);
    border: none;
    border-radius: 12px;
    width: 46px;
    height: 46px;
    font-size: 20px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: rgba(255,255,255,0.5);
    transition: background 0.2s;
  }
  .btn-trophy:active { background: rgba(255,255,255,0.15); }

  /* ── GAME ── */
  #game {
    background: var(--bg);
    transition: background var(--transition);
  }
  #game-bg-glow {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at center, var(--accent) 0%, transparent 65%);
    opacity: 0.22;
    pointer-events: none;
    transition: background var(--transition), opacity var(--transition);
  }
  .score-bar {
    position: absolute;
    top: max(72px, env(safe-area-inset-top, 20px) + 56px);
    left: 0; right: 0;
    padding: 0 28px;
    display: flex;
    justify-content: space-between;
    z-index: 10;
  }
  .score-num {
    font-size: 38px;
    font-weight: 900;
    line-height: 1;
    transition: color 0.3s;
  }
  .score-label {
    font-size: 11px;
    letter-spacing: 3px;
    color: rgba(255,255,255,0.4);
    text-transform: uppercase;
  }
  #streak-num { color: #fff; }

  /* Arrow area — fixed height so it never collapses */
  #arrow-area {
    flex: 1;
    min-height: 220px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    width: 100%;
  }
  #game-arrow {
    font-size: 160px;
    line-height: 1;
    transition: color 0.4s, text-shadow 0.4s, opacity 0.1s;
    will-change: transform;
    color: var(--arrow-color);
    text-shadow: 0 0 32px var(--arrow-color);
    transform-origin: center;
  }

  /* Buttons */
  #btn-grid {
    width: 100%;
    padding: 0 16px;
    padding-bottom: max(24px, env(safe-area-inset-bottom, 0px) + 24px);
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    position: relative; /* required for swap-overlay absolute positioning */
  }
  .dir-btn {
    height: 130px;
    background: var(--btn-fill);
    border: 1.5px solid var(--btn-border);
    border-radius: 22px;
    font-size: 52px;
    color: #fff;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.55s, border-color 0.55s, transform 0.12s;
    position: relative;
    z-index: 1;
    overflow: visible;
    will-change: transform;
  }
  .dir-btn.nudged { z-index: 0; opacity: 0.7; }
  .dir-btn:active { transform: scale(0.88); }
  .dir-btn.decoy { animation: decoyShake 0.06s ease-in-out 8 alternate; }
  /* Swap overlay: sits OVER a slot, pointer-events:none so button below is still tappable */
  .swap-overlay {
    position: absolute;
    border-radius: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    z-index: 5;
    background: rgba(0,0,0,0.82);
    color: var(--arrow-color);
    text-shadow: 0 0 20px var(--arrow-color);
    box-shadow: 0 0 24px var(--arrow-color);
    border: 2px solid var(--arrow-color);
    font-size: 52px;
    transition: opacity 0.2s;
  }
  .swap-overlay.hidden { display: none !important; }
  @keyframes decoyShake { from { transform: translateX(-6px); } to { transform: translateX(6px); } }
  .dir-btn.wrong-cue { border-color: var(--arrow-color); background: rgba(255,40,50,0.2); }

  /* Flash overlay */
  #flash-overlay {
    position: absolute; inset: 0;
    background: rgba(255,20,10,0.55);
    pointer-events: none;
    opacity: 0;
    z-index: 50;
    transition: opacity 0.12s;
  }
  #flash-overlay.show { opacity: 1; }
  #correct-flash {
    position: absolute; inset: 0;
    background: rgba(255,255,255,0.07);
    pointer-events: none;
    opacity: 0;
    z-index: 50;
  }
  #correct-flash.show { opacity: 1; transition: none; }
  #correct-flash.hide { opacity: 0; transition: opacity 0.15s; }

  /* ── GAME OVER ── */
  #gameover {
    background: #000;
    flex-direction: column;
    overflow-y: auto;
    justify-content: flex-start;
    padding: max(50px, env(safe-area-inset-top,0px)+48px) 0 max(48px, env(safe-area-inset-bottom,0px)+40px);
    gap: 0;
  }
  .go-x { font-size: 64px; margin-bottom: 16px; color: #FF2832; filter: drop-shadow(0 0 20px rgba(255,20,10,0.6)); }
  .go-title { font-size: 30px; font-weight: 900; letter-spacing: 6px; margin-bottom: 4px; }
  .go-streak { font-size: 15px; color: rgba(255,255,255,0.4); margin-bottom: 22px; }
  .go-score { font-size: 64px; font-weight: 900; background: linear-gradient(135deg, #FF2832, #FF8855); -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 1; }
  .go-pts { font-size: 10px; letter-spacing: 4px; color: rgba(255,255,255,0.3); margin-bottom: 28px; }
  .go-new-high { font-size: 13px; font-weight: 900; letter-spacing: 3px; color: #FFD700; margin-bottom: 16px; }

  /* Leaderboard section */
  .lb-section { width: 100%; max-width: 440px; padding: 0 24px; }
  .lb-header { display: flex; justify-content: space-between; align-items: center; font-size: 10px; letter-spacing: 3px; color: rgba(255,255,255,0.3); margin-bottom: 10px; }
  .lb-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 14px;
    border-radius: 10px;
    background: rgba(255,255,255,0.04);
    margin-bottom: 6px;
    min-height: 48px;
  }
  .lb-row.pending {
    background: rgba(255,40,50,0.12);
    border: 1px solid rgba(255,40,50,0.45);
  }
  .lb-rank { width: 26px; font-size: 14px; font-weight: 900; color: rgba(255,255,255,0.4); flex-shrink: 0; }
  .lb-rank.gold { color: #FFD700; }
  .lb-rank.silver { color: #C8C8C8; }
  .lb-rank.bronze { color: #CC8033; }
  .lb-name { flex: 1; font-size: 15px; font-weight: 600; }
  .lb-score-val { font-size: 16px; font-weight: 900; }
  .pending .lb-score-val { color: #FF2832; }
  .lb-name-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    font-size: 15px;
    font-weight: 600;
    color: #fff;
    font-family: inherit;
    padding: 0;
  }
  .lb-name-input::placeholder { color: rgba(255,255,255,0.35); }
  .lb-save-btn {
    background: none;
    border: none;
    font-size: 22px;
    cursor: pointer;
    padding: 0;
    line-height: 1;
    flex-shrink: 0;
  }

  /* Go actions */
  .go-actions {
    display: flex;
    gap: 12px;
    width: 100%;
    max-width: 440px;
    padding: 20px 24px 0;
  }
  .go-btn {
    flex: 1;
    padding: 20px 0;
    border-radius: 14px;
    font-size: 17px;
    font-weight: 900;
    letter-spacing: 3px;
    border: none;
    cursor: pointer;
    transition: transform 0.1s;
  }
  .go-btn:active { transform: scale(0.96); }
  .go-btn.menu { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.6); }
  .go-btn.again { background: #FF2832; color: #000; }

  /* ── LEADERBOARD MODAL ── */
  #lb-modal {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(0,0,0,0.9);
    display: flex; flex-direction: column;
    padding: max(56px, env(safe-area-inset-top,0px)+40px) 0 max(40px, env(safe-area-inset-bottom,0px)+20px);
  }
  #lb-modal.hidden { display: none; }
  .lb-modal-title { font-size: 24px; font-weight: 900; letter-spacing: 4px; text-align: center; margin-bottom: 20px; }
  .lb-modal-list { flex: 1; overflow-y: auto; padding: 0 24px; }
  .lb-modal-close {
    margin: 20px auto 0;
    background: rgba(255,255,255,0.1);
    border: none;
    color: #fff;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 3px;
    padding: 14px 40px;
    border-radius: 12px;
    cursor: pointer;
  }
  .lb-empty { text-align: center; color: rgba(255,255,255,0.3); font-size: 16px; margin-top: 60px; }

  /* Particles */
  .particle {
    position: absolute;
    border-radius: 50%;
    background: #FF2832;
    pointer-events: none;
    animation: float linear infinite;
  }
  @keyframes float {
    0% { opacity: 0.3; transform: translate(0, 0); }
    50% { opacity: 0.5; }
    100% { opacity: 0.2; transform: translate(var(--tx), var(--ty)); }
  }
</style>
</head>
<body>

<!-- ── MENU ── -->
<div id="menu" class="screen">
  <button class="btn-trophy" id="trophy-btn" onclick="showLeaderboard()">🏆</button>

  <h1 class="menu-title" style="opacity:0;transform:translateY(-24px);transition:opacity 0.6s 0.1s,transform 0.6s 0.1s" id="menu-title">OPPOSITE</h1>
  <div class="menu-rule" id="menu-rule"></div>
  <p class="menu-sub" style="opacity:0;transition:opacity 0.5s 0.45s" id="menu-sub">CHOOSE THE WRONG ANSWER</p>

  <div class="menu-arrows" style="opacity:0;transition:opacity 0.5s 0.6s" id="menu-demo">
    <span class="menu-arrow-up">↑</span>
    <span class="menu-equals">=</span>
    <span class="menu-arrow-down">↓</span>
  </div>

  <button class="btn-start" onclick="startGame()" style="opacity:0;transform:translateY(16px);transition:opacity 0.5s 0.85s,transform 0.5s 0.85s" id="start-btn">START</button>

  <div id="menu-particles"></div>
</div>

<!-- ── GAME ── -->
<div id="game" class="screen hidden">
  <div id="game-bg-glow"></div>
  <div id="flash-overlay"></div>
  <div id="correct-flash"></div>

  <div class="score-bar">
    <div>
      <div class="score-num" id="score-num">0</div>
      <div class="score-label">SCORE</div>
    </div>
    <div style="text-align:right">
      <div class="score-num" id="streak-num">0</div>
      <div class="score-label">STREAK</div>
    </div>
  </div>

  <div id="arrow-area">
    <div id="game-arrow">↑</div>
  </div>

  <div id="btn-grid">
    <button class="dir-btn" id="btn-0" onclick="tapDir(0)"></button>
    <button class="dir-btn" id="btn-1" onclick="tapDir(1)"></button>
    <button class="dir-btn" id="btn-2" onclick="tapDir(2)"></button>
    <button class="dir-btn" id="btn-3" onclick="tapDir(3)"></button>
    <!-- Swap overlay: floats ON TOP of a slot, purely visual, does NOT replace or hide the button -->
    <div id="swap-overlay" class="swap-overlay hidden"></div>
  </div>
</div>

<!-- ── GAME OVER ── -->
<div id="gameover" class="screen hidden">
  <div class="go-x">✕</div>
  <div class="go-title">GAME OVER</div>
  <div class="go-streak" id="go-streak">0 in a row</div>
  <div class="go-score" id="go-score">0</div>
  <div class="go-pts">POINTS</div>
  <div class="go-new-high hidden" id="go-new-high">🏆 NEW HIGH SCORE</div>

  <div class="lb-section" id="go-lb-section">
    <div class="lb-header">
      <span>LEADERBOARD</span>
      <span id="go-lb-rank-label"></span>
    </div>
    <div id="go-lb-list"></div>
  </div>

  <div class="go-actions">
    <button class="go-btn menu" onclick="goMenu()">MENU</button>
    <button class="go-btn again" onclick="startGame()">AGAIN</button>
  </div>
</div>

<!-- ── LEADERBOARD MODAL ── -->
<div id="lb-modal" class="hidden">
  <div class="lb-modal-title">LEADERBOARD</div>
  <div class="lb-modal-list" id="lb-modal-list"></div>
  <button class="lb-modal-close" onclick="hideLeaderboard()">CLOSE</button>
</div>

<script>
'use strict';

// ── Directions ──
const DIRS = ['up','down','left','right'];
const ARROWS = { up:'↑', down:'↓', left:'←', right:'→' };
const OPPOSITE = { up:'down', down:'up', left:'right', right:'left' };

// ── Themes ──
const THEMES = [
  { bg:'#121214', arrow:'#FF2832', accent:'#96141E', fill:'#232328', border:'#32343C' },
  { bg:'#232328', arrow:'#82B4FF', accent:'#508CFF', fill:'#32343C', border:'#465F78' },
  { bg:'#192841', arrow:'#FFFFFF', accent:'#508CFF', fill:'rgba(70,95,120,0.5)', border:'rgba(80,140,255,0.7)' },
  { bg:'#121214', arrow:'#FFD28C', accent:'#DCA050', fill:'#232328', border:'#B48C46' },
  { bg:'#232328', arrow:'#FFDF9A', accent:'#FFD28C', fill:'#32343C', border:'#B48C46' },
  { bg:'#780A14', arrow:'#FFE066', accent:'#FFD28C', fill:'#96141E', border:'#DCA050' },
  { bg:'#32343C', arrow:'#82BEFF', accent:'#508CFF', fill:'rgba(70,95,120,0.4)', border:'rgba(80,140,255,0.5)' },
  { bg:'#32343C', arrow:'#F0C060', accent:'#B48C46', fill:'#232328', border:'rgba(180,140,70,0.6)' },
];

// ── Game State ──
let score = 0, streak = 0, currentDir = 'up', questionStart = 0;
let layout = [0,1,2,3]; // which direction index maps to which slot
let currentTheme = 0;
let questionsSinceShuffle = 0, nextShuffleIn = 3;
let trickTimer = null;
const leaderboard = JSON.parse(localStorage.getItem('opposite_lb') || '[]');
let pendingScore = 0;

// ── Init menu animation ──
window.addEventListener('load', () => {
  const t = document.getElementById('menu-title');
  const s = document.getElementById('menu-sub');
  const d = document.getElementById('menu-demo');
  const b = document.getElementById('start-btn');
  requestAnimationFrame(() => {
    t.style.opacity = '1'; t.style.transform = 'translateY(0)';
    s.style.opacity = '1';
    d.style.opacity = '1';
    b.style.opacity = '1'; b.style.transform = 'translateY(0)';
  });
  spawnParticles();
});

function spawnParticles() {
  const c = document.getElementById('menu-particles');
  for (let i = 0; i < 6; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = Math.random() * 4 + 3;
    const tx = (Math.random() - 0.5) * 320;
    const ty = (Math.random() - 0.5) * 560;
    p.style.cssText = `width:${size}px;height:${size}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--tx:${tx}px;--ty:${ty}px;animation-duration:${3+Math.random()*4}s;animation-delay:${Math.random()*2}s;`;
    c.appendChild(p);
  }
}

// ── Screens ──
function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}
function goMenu() { show('menu'); }

// ── Start Game ──
function startGame() {
  score = 0; streak = 0;
  currentTheme = 0;
  questionsSinceShuffle = 0;
  nextShuffleIn = 3;
  applyTheme(THEMES[0]);
  clearTricks();
  show('game');
  updateScoreBar();
  nextQuestion();
}

function nextQuestion() {
  clearTricks();
  const prev = currentDir;
  do { currentDir = DIRS[Math.floor(Math.random()*4)]; } while (currentDir === prev);
  questionStart = Date.now();
  setArrowDir(currentDir);
  setArrowScale(1, true);
  setArrowVisible(true);
  setArrowColor(null);
  renderButtons();
  maybeTriggerTrick();
}

// ── Direction mapping ──
function setArrowDir(dir) {
  const angle = { up:0, right:90, down:180, left:270 };
  const el = document.getElementById('game-arrow');
  el.textContent = '↑';
  el.style.transform = `rotate(${angle[dir]}deg) scale(${currentArrowScale})`;
  // Random size
  const sizes = [100,120,140,160,180,200,220,190,150,130];
  const s = sizes[Math.floor(Math.random()*sizes.length)];
  el.style.fontSize = s + 'px';
}
let currentArrowScale = 1;
function setArrowScale(s, animate) {
  currentArrowScale = s;
  const el = document.getElementById('game-arrow');
  const angle = { up:0, right:90, down:180, left:270 }[currentDir];
  el.style.transition = animate ? 'transform 0.35s cubic-bezier(0.34,1.56,0.64,1)' : 'none';
  el.style.transform = `rotate(${angle}deg) scale(${s})`;
}
function setArrowVisible(v) {
  document.getElementById('game-arrow').style.opacity = v ? '1' : '0';
}
function setArrowColor(col) {
  const el = document.getElementById('game-arrow');
  const c = col || THEMES[currentTheme].arrow;
  el.style.color = c;
  el.style.textShadow = `0 0 32px ${c}`;
}

// ── Button rendering ──
function renderButtons() {
  layout.forEach((dirIdx, slot) => {
    const dir = DIRS[dirIdx];
    const btn = document.getElementById('btn-' + slot);
    btn.textContent = ARROWS[dir];
    btn.dataset.dir = dir;
    btn.className = 'dir-btn';
    btn.style.cssText = '';
    btn.style.pointerEvents = '';
  });
}

// ── Tap handler ──
function tapDir(slot) {
  const btn = document.getElementById('btn-' + slot);
  const chosen = btn.dataset.dir;
  if (!chosen) return;

  const elapsed = (Date.now() - questionStart) / 1000;

  if (chosen === OPPOSITE[currentDir]) {
    // ✅ Correct
    const pts = Math.max(1, Math.round(1000 * Math.exp(-elapsed * 1.5)));
    score += pts;
    streak++;
    updateScoreBar();
    pulseCorrect();
    if (window.navigator.vibrate) navigator.vibrate(40);

    // Shuffle check
    questionsSinceShuffle++;
    if (questionsSinceShuffle >= nextShuffleIn) {
      shuffleButtons();
      questionsSinceShuffle = 0;
      nextShuffleIn = randomShuffleInterval();
      const t = (currentTheme + 1 + Math.floor(Math.random()*(THEMES.length-1))) % THEMES.length;
      currentTheme = t;
      applyTheme(THEMES[t]);
    }

    setTimeout(nextQuestion, 80);
  } else {
    // ❌ Wrong
    if (window.navigator.vibrate) navigator.vibrate([80,40,80]);
    showFlash();
    shakeScreen();
    setTimeout(() => endGame(), 500);
  }
}

function shuffleButtons() {
  for (let i = layout.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [layout[i], layout[j]] = [layout[j], layout[i]];
  }
}

function randomShuffleInterval() {
  const base = Math.max(1, 6 - Math.floor(streak / 5));
  return Math.max(1, base - 1 + Math.floor(Math.random() * 3));
}

function updateScoreBar() {
  document.getElementById('score-num').textContent = score;
  const sn = document.getElementById('streak-num');
  sn.textContent = streak;
  const th = THEMES[currentTheme];
  sn.style.color = streak >= 6 ? th.accent : '#fff';
}

function applyTheme(th) {
  const g = document.getElementById('game');
  const glow = document.getElementById('game-bg-glow');
  g.style.setProperty('--bg', th.bg);
  g.style.setProperty('--arrow-color', th.arrow);
  g.style.setProperty('--accent', th.accent);
  g.style.setProperty('--btn-fill', th.fill);
  g.style.setProperty('--btn-border', th.border);
  g.style.background = th.bg;
  glow.style.background = `radial-gradient(ellipse at center, ${th.accent} 0%, transparent 65%)`;
  setArrowColor(null);
}

// ── Tricks ──
// Unlock at streak 5; probability grows quickly. Multiple tricks can stack at high streaks.
function maybeTriggerTrick() {
  if (streak < 5) return;

  // Aggressive ramp: starts at 25% at streak 5, caps at 80% at streak 20+
  const prob = Math.min(0.25 + (streak - 5) * 0.04, 0.80);
  if (Math.random() > prob) return;

  // At streak 15+ fire 2 tricks at once for chaos
  fireTrick(pickTrick());
  if (streak >= 15 && Math.random() < 0.4) {
    setTimeout(() => fireTrick(pickTrick()), 120);
  }
}

function pickTrick() {
  // NO button position tricks — only visual/arrow tricks
  // Never move buttons out of their grid slots
  const pool = ['wrongColor', 'arrowShift', 'decoyShake'];
  if (streak >= 8)  pool.push('flash', 'shrinkTiny');
  if (streak >= 12) pool.push('swap'); // arrow ↔ button CENTER only — no grid moves
  if (streak >= 18) pool.push('flash', 'shrinkTiny', 'arrowShift');
  return pool[Math.floor(Math.random() * pool.length)];
}

function fireTrick(t) {
  clearTrickTimers();

  // Helper: pick a WRONG button slot (never touches the correct answer)
  const correctDir = OPPOSITE[currentDir];
  const correctSlot = layout.findIndex(i => DIRS[i] === correctDir);
  function wrongSlot() {
    const slots = [0,1,2,3].filter(s => s !== correctSlot);
    return slots[Math.floor(Math.random()*slots.length)];
  }

  switch(t) {

    case 'swap': {
      // VISUAL ONLY: show the puzzle arrow overlaid on a wrong-answer slot.
      // The button underneath is NEVER hidden or moved — still fully tappable.
      // The correct answer button is NEVER involved.
      // We only hide the main arrow and show an overlay on a wrong slot.
      const slot = wrongSlot();
      const btn = document.getElementById('btn-' + slot);
      const grid = document.getElementById('btn-grid');
      const gridRect = grid.getBoundingClientRect();
      const btnRect = btn.getBoundingClientRect();

      // Position overlay exactly over the button using absolute coords within grid
      const overlay = document.getElementById('swap-overlay');
      overlay.style.left   = (btnRect.left - gridRect.left) + 'px';
      overlay.style.top    = (btnRect.top  - gridRect.top)  + 'px';
      overlay.style.width  = btnRect.width  + 'px';
      overlay.style.height = btnRect.height + 'px';
      // Show puzzle arrow direction as unicode arrow
      const arrowChars = {up:'↑', right:'→', down:'↓', left:'←'};
      overlay.textContent = arrowChars[currentDir];
      overlay.style.setProperty('--arrow-color', THEMES[currentTheme].arrow);
      overlay.classList.remove('hidden');

      // Hide the main center arrow
      document.getElementById('game-arrow').style.opacity = '0';

      trickTimer = setTimeout(clearSwapTrick, 2500);
      break;
    }

    case 'wrongColor': {
      // Highlight a WRONG button with the arrow's color (looks like a hint but isn't)
      const slot = wrongSlot();
      const btn = document.getElementById('btn-' + slot);
      btn.style.borderColor = THEMES[currentTheme].arrow;
      btn.style.background = hexToRgba(THEMES[currentTheme].arrow, 0.25);
      trickTimer = setTimeout(() => {
        btn.style.borderColor = '';
        btn.style.background = '';
      }, 1000);
      break;
    }

    case 'arrowShift': {
      // Arrow briefly changes to a misleading color
      const decoys = ['#508CFF','#FFD28C','#96141E','#32E8A0','#FF6B9D'];
      const c = decoys[Math.floor(Math.random()*decoys.length)];
      setArrowColor(c);
      trickTimer = setTimeout(() => setArrowColor(null), 900);
      break;
    }

    case 'shrinkTiny': {
      // Arrow becomes very small
      setArrowScale(0.12, true);
      trickTimer = setTimeout(() => setArrowScale(1, true), 1200);
      break;
    }

    case 'decoyShake': {
      // A wrong button vibrates like it wants to be tapped
      const slot = wrongSlot();
      const btn = document.getElementById('btn-' + slot);
      btn.classList.add('decoy');
      trickTimer = setTimeout(() => btn.classList.remove('decoy'), 700);
      break;
    }

    case 'flash': {
      // Arrow flashes then disappears — tap from memory
      trickTimer = setTimeout(() => setArrowVisible(false), 200);
      break;
    }
  }
}

function clearSwapTrick() {
  // Hide the overlay (button underneath was never touched)
  const overlay = document.getElementById('swap-overlay');
  if (overlay) overlay.classList.add('hidden');
  // Restore main arrow
  const arrow = document.getElementById('game-arrow');
  if (arrow) arrow.style.opacity = '1';
}

function tapDirByName(dir) {
  if (!dir) return;
  // Find the slot for this dir and delegate
  const slot = layout.findIndex(i => DIRS[i] === dir);
  if (slot >= 0) tapDir(slot);
}

function hexToRgba(hex, a) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

let trickTimers = [];
function clearTrickTimers() {
  if (trickTimer) { clearTimeout(trickTimer); trickTimer = null; }
}
function clearTricks() {
  clearTrickTimers();
  clearSwapTrick();
  setArrowVisible(true);
  setArrowColor(null);
  setArrowScale(1, false);
  document.getElementById('game-arrow').style.transition = '';
  document.getElementById('game-arrow').style.transform = '';
  [0,1,2,3].forEach(i => {
    const b = document.getElementById('btn-'+i);
    b.classList.remove('decoy','wrong-cue','nudged');
    b.style.borderColor = '';
    b.style.background = '';
  });
  layout = [0,1,2,3];
}

// ── FX ──
function pulseCorrect() {
  const el = document.getElementById('correct-flash');
  el.className = 'show';
  setTimeout(() => el.className = 'hide', 20);
  setTimeout(() => el.className = '', 180);
}
function showFlash() {
  const el = document.getElementById('flash-overlay');
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 450);
}
function shakeScreen() {
  const g = document.getElementById('game');
  g.style.animation = 'none';
  let start = null, dur = 400;
  function step(ts) {
    if (!start) start = ts;
    const p = (ts - start) / dur;
    if (p < 1) {
      const x = Math.sin(p * Math.PI * 8) * 12 * (1-p);
      const y = Math.cos(p * Math.PI * 6) * 8 * (1-p);
      g.style.transform = `translate(${x}px,${y}px)`;
      requestAnimationFrame(step);
    } else {
      g.style.transform = '';
    }
  }
  requestAnimationFrame(step);
}

// ── End Game ──
function endGame() {
  pendingScore = score;
  const top = leaderboard[0]?.score ?? 0;
  const isNew = score > top && score > 0;

  document.getElementById('go-score').textContent = score;
  document.getElementById('go-streak').textContent = `${streak} in a row`;
  document.getElementById('go-new-high').classList.toggle('hidden', !isNew);

  renderGameOverLeaderboard();
  show('gameover');
}

function renderGameOverLeaderboard() {
  const list = document.getElementById('go-lb-list');
  const rankLabel = document.getElementById('go-lb-rank-label');
  list.innerHTML = '';

  // Calculate where the new score fits
  const betterCount = leaderboard.filter(e => e.score > pendingScore).length;
  const newRank = betterCount + 1;
  rankLabel.textContent = pendingScore > 0 ? `#${newRank}` : '';

  // Build merged display
  let inserted = false;
  let rank = 1;
  const entries = [];

  for (const entry of leaderboard) {
    if (!inserted && rank === newRank && pendingScore > 0) {
      entries.push({ pending: true, rank, score: pendingScore });
      inserted = true;
      rank++;
    }
    entries.push({ pending: false, rank, name: entry.name, score: entry.score });
    rank++;
  }
  if (!inserted && pendingScore > 0) {
    entries.push({ pending: true, rank, score: pendingScore });
  }

  entries.slice(0,10).forEach(e => {
    const row = document.createElement('div');
    row.className = 'lb-row' + (e.pending ? ' pending' : '');

    const rankEl = document.createElement('div');
    rankEl.className = 'lb-rank' + (e.rank===1?' gold':e.rank===2?' silver':e.rank===3?' bronze':'');
    rankEl.textContent = e.rank;
    row.appendChild(rankEl);

    if (e.pending) {
      const input = document.createElement('input');
      input.type = 'text';
      input.className = 'lb-name-input';
      input.placeholder = 'Your name…';
      input.id = 'go-name-input';
      input.maxLength = 20;
      input.addEventListener('keydown', ev => { if (ev.key === 'Enter') saveScore(); });
      row.appendChild(input);

      const scoreEl = document.createElement('div');
      scoreEl.className = 'lb-score-val';
      scoreEl.textContent = e.score;
      row.appendChild(scoreEl);

      const saveBtn = document.createElement('button');
      saveBtn.className = 'lb-save-btn';
      saveBtn.textContent = '✓';
      saveBtn.onclick = saveScore;
      row.appendChild(saveBtn);
    } else {
      const nameEl = document.createElement('div');
      nameEl.className = 'lb-name';
      nameEl.textContent = e.name;
      row.appendChild(nameEl);

      const scoreEl = document.createElement('div');
      scoreEl.className = 'lb-score-val';
      scoreEl.textContent = e.score;
      row.appendChild(scoreEl);
    }

    list.appendChild(row);
  });

  // Focus name input
  setTimeout(() => {
    const inp = document.getElementById('go-name-input');
    if (inp) inp.focus();
  }, 400);
}

function saveScore() {
  const inp = document.getElementById('go-name-input');
  const name = (inp?.value || 'Anonymous').trim() || 'Anonymous';
  leaderboard.push({ name, score: pendingScore, date: Date.now() });
  leaderboard.sort((a,b) => b.score - a.score);
  if (leaderboard.length > 10) leaderboard.length = 10;
  localStorage.setItem('opposite_lb', JSON.stringify(leaderboard));
  goMenu();
}

// ── Leaderboard Modal ──
function showLeaderboard() {
  const modal = document.getElementById('lb-modal');
  const list = document.getElementById('lb-modal-list');
  modal.classList.remove('hidden');
  list.innerHTML = '';
  if (leaderboard.length === 0) {
    list.innerHTML = '<div class="lb-empty">No scores yet.<br>Play to get on the board.</div>';
    return;
  }
  leaderboard.forEach((entry, i) => {
    const row = document.createElement('div');
    row.className = 'lb-row';
    const rank = i+1;
    const rankEl = document.createElement('div');
    rankEl.className = 'lb-rank' + (rank===1?' gold':rank===2?' silver':rank===3?' bronze':'');
    rankEl.textContent = rank;
    row.appendChild(rankEl);
    const nameEl = document.createElement('div');
    nameEl.className = 'lb-name';
    nameEl.textContent = entry.name;
    row.appendChild(nameEl);
    const scoreEl = document.createElement('div');
    scoreEl.className = 'lb-score-val';
    scoreEl.textContent = entry.score;
    row.appendChild(scoreEl);
    list.appendChild(row);
  });
}
function hideLeaderboard() {
  document.getElementById('lb-modal').classList.add('hidden');
}
