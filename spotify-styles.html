<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visual Style Explorer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a; 
      color: white;
      padding: 40px;
    }
    h1 { text-align: center; margin-bottom: 10px; font-weight: 300; font-size: 2rem; }
    .subtitle { text-align: center; color: #666; margin-bottom: 40px; }
    h2 { 
      font-size: 1rem; 
      text-transform: uppercase; 
      letter-spacing: 3px; 
      color: #555; 
      margin: 40px 0 20px;
      border-bottom: 1px solid #222;
      padding-bottom: 10px;
    }
    .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 24px; max-width: 1000px; margin: 0 auto; }
    .card {
      height: 280px;
      border-radius: 16px;
      position: relative;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.3s, box-shadow 0.3s;
    }
    .card:hover { transform: scale(1.02); box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
    .card-label {
      position: absolute;
      bottom: 16px;
      left: 16px;
      background: rgba(0,0,0,0.7);
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 0.9rem;
      backdrop-filter: blur(10px);
    }
    
    /* LIQUID STYLES */
    .lava-lamp {
      background: linear-gradient(135deg, #ff6b35, #f72585, #7209b7, #3a0ca3);
      animation: lavaMove 8s ease-in-out infinite;
    }
    .lava-lamp::before {
      content: '';
      position: absolute;
      width: 120px; height: 120px;
      background: rgba(255,255,255,0.3);
      border-radius: 60% 40% 50% 50%;
      top: 20%; left: 20%;
      filter: blur(20px);
      animation: float1 6s ease-in-out infinite;
    }
    .lava-lamp::after {
      content: '';
      position: absolute;
      width: 80px; height: 80px;
      background: rgba(255,200,100,0.4);
      border-radius: 40% 60% 50% 50%;
      bottom: 30%; right: 25%;
      filter: blur(15px);
      animation: float2 5s ease-in-out infinite;
    }
    @keyframes float1 { 0%, 100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-30px) scale(1.1); } }
    @keyframes float2 { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(20px) rotate(10deg); } }
    
    .ocean {
      background: linear-gradient(180deg, #0077b6, #023e8a, #03045e);
      position: relative;
    }
    .ocean::before {
      content: '';
      position: absolute;
      width: 200%; height: 200%;
      top: -50%; left: -50%;
      background: radial-gradient(ellipse at center, rgba(255,255,255,0.1) 0%, transparent 70%);
      animation: wave 4s ease-in-out infinite;
    }
    .ocean::after {
      content: '🫧 🫧 🫧';
      position: absolute;
      font-size: 2rem;
      top: 40%; left: 30%;
      opacity: 0.5;
      animation: bubbles 3s ease-in-out infinite;
    }
    @keyframes wave { 0%, 100% { transform: translateX(0) translateY(0); } 50% { transform: translateX(-20px) translateY(10px); } }
    @keyframes bubbles { 0%, 100% { transform: translateY(0); opacity: 0.5; } 50% { transform: translateY(-20px); opacity: 0.8; } }
    
    .mercury {
      background: linear-gradient(135deg, #2d3436, #636e72, #b2bec3, #636e72, #2d3436);
      background-size: 200% 200%;
      animation: shimmer 3s ease-in-out infinite;
    }
    .mercury::before {
      content: '';
      position: absolute;
      width: 100px; height: 100px;
      background: linear-gradient(135deg, #dfe6e9, #b2bec3);
      border-radius: 50%;
      top: 30%; left: 25%;
      box-shadow: 0 0 40px rgba(255,255,255,0.3), inset -10px -10px 30px rgba(0,0,0,0.3);
    }
    .mercury::after {
      content: '';
      position: absolute;
      width: 60px; height: 60px;
      background: linear-gradient(135deg, #b2bec3, #636e72);
      border-radius: 50%;
      bottom: 25%; right: 30%;
      box-shadow: 0 0 30px rgba(255,255,255,0.2), inset -5px -5px 20px rgba(0,0,0,0.3);
    }
    @keyframes shimmer { 0%, 100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }
    
    .ink {
      background: #0d1b2a;
      overflow: hidden;
    }
    .ink::before {
      content: '';
      position: absolute;
      width: 150px; height: 150px;
      background: radial-gradient(circle, #e63946 0%, transparent 70%);
      top: 20%; left: 15%;
      filter: blur(30px);
      animation: inkSpread1 6s ease-in-out infinite;
    }
    .ink::after {
      content: '';
      position: absolute;
      width: 120px; height: 120px;
      background: radial-gradient(circle, #457b9d 0%, transparent 70%);
      bottom: 20%; right: 20%;
      filter: blur(25px);
      animation: inkSpread2 5s ease-in-out infinite;
    }
    .ink .extra {
      position: absolute;
      width: 100px; height: 100px;
      background: radial-gradient(circle, #f4a261 0%, transparent 70%);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      filter: blur(20px);
      animation: inkSpread3 7s ease-in-out infinite;
    }
    @keyframes inkSpread1 { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.3); opacity: 0.5; } }
    @keyframes inkSpread2 { 0%, 100% { transform: scale(1.1); opacity: 0.7; } 50% { transform: scale(0.9); opacity: 0.9; } }
    @keyframes inkSpread3 { 0%, 100% { transform: translate(-50%, -50%) scale(1); } 50% { transform: translate(-50%, -50%) scale(1.2); } }

    /* FERMENTED STYLES */
    .rust {
      background: linear-gradient(135deg, #1a1a1a, #2d2d2d);
      position: relative;
    }
    .rust::before {
      content: '';
      position: absolute;
      inset: 0;
      background: 
        radial-gradient(ellipse at 30% 40%, rgba(180,80,40,0.6) 0%, transparent 50%),
        radial-gradient(ellipse at 70% 60%, rgba(139,69,19,0.5) 0%, transparent 40%),
        radial-gradient(ellipse at 50% 80%, rgba(205,92,20,0.4) 0%, transparent 45%);
    }
    .rust::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.15'/%3E%3C/svg%3E");
    }
    
    .moss {
      background: linear-gradient(180deg, #2d3436, #1e272e);
      position: relative;
    }
    .moss::before {
      content: '🌿🍃🌱';
      position: absolute;
      font-size: 2.5rem;
      bottom: 20px;
      left: 20px;
      opacity: 0.8;
    }
    .moss::after {
      content: '';
      position: absolute;
      inset: 0;
      background: 
        radial-gradient(ellipse at 20% 80%, rgba(46,125,50,0.4) 0%, transparent 40%),
        radial-gradient(ellipse at 80% 70%, rgba(76,175,80,0.3) 0%, transparent 35%),
        radial-gradient(ellipse at 40% 90%, rgba(27,94,32,0.5) 0%, transparent 30%);
    }
    .moss .extra {
      position: absolute;
      top: 30%;
      right: 20%;
      font-size: 1.5rem;
      opacity: 0.6;
    }
    .moss .extra::before { content: '🍄'; }
    
    .paper {
      background: linear-gradient(135deg, #d4c4a8, #c4b393, #b8a67e);
      position: relative;
    }
    .paper::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='paper'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.04' numOctaves='5' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23paper)' opacity='0.1'/%3E%3C/svg%3E");
    }
    .paper::after {
      content: '';
      position: absolute;
      top: 10px; left: 10px; right: 10px; bottom: 10px;
      border: 1px solid rgba(139,90,43,0.3);
      border-radius: 4px;
    }
    .paper .stain {
      position: absolute;
      width: 80px; height: 80px;
      background: radial-gradient(circle, rgba(139,90,43,0.3) 0%, transparent 70%);
      top: 20%; right: 25%;
      border-radius: 50%;
    }
    .paper .card-label { background: rgba(139,90,43,0.8); color: #f5f0e6; }
    
    .glitch {
      background: #0a0a0a;
      position: relative;
      overflow: hidden;
    }
    .glitch::before {
      content: 'CORRUPTED_DATA';
      position: absolute;
      font-family: monospace;
      font-size: 1.2rem;
      color: #00ff41;
      top: 30%;
      left: 10%;
      text-shadow: 2px 0 #ff0040, -2px 0 #00ffff;
      animation: glitchText 0.5s infinite;
    }
    .glitch::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,255,65,0.03) 2px,
        rgba(0,255,65,0.03) 4px
      );
    }
    .glitch .scanline {
      position: absolute;
      width: 100%;
      height: 4px;
      background: rgba(255,0,64,0.3);
      animation: scan 2s linear infinite;
    }
    @keyframes glitchText { 
      0%, 100% { transform: translate(0); } 
      20% { transform: translate(-2px, 1px); }
      40% { transform: translate(2px, -1px); }
      60% { transform: translate(-1px, 2px); }
    }
    @keyframes scan { 0% { top: -10%; } 100% { top: 110%; } }
    
    @media (max-width: 700px) {
      .grid { grid-template-columns: 1fr; }
      body { padding: 20px; }
    }
  </style>
</head>
<body>
  <h1>🎵 Visual Style Explorer</h1>
  <p class="subtitle">Hover to feel the vibe. Pick your favorites.</p>
  
  <h2>Liquid IA — Songs that flow</h2>
  <div class="grid">
    <div class="card lava-lamp">
      <span class="card-label">1. Lava Lamp</span>
    </div>
    <div class="card ocean">
      <span class="card-label">2. Ocean</span>
    </div>
    <div class="card mercury">
      <span class="card-label">3. Mercury</span>
    </div>
    <div class="card ink">
      <div class="extra"></div>
      <span class="card-label">4. Ink in Water</span>
    </div>
  </div>
  
  <h2>Fermented Interfaces — Songs that age</h2>
  <div class="grid">
    <div class="card rust">
      <span class="card-label">1. Digital Rust</span>
    </div>
    <div class="card moss">
      <div class="extra"></div>
      <span class="card-label">2. Moss & Growth</span>
    </div>
    <div class="card paper">
      <div class="stain"></div>
      <span class="card-label">3. Aged Paper</span>
    </div>
    <div class="card glitch">
      <div class="scanline"></div>
      <span class="card-label">4. Glitch Decay</span>
    </div>
  </div>
</body>
</html>
