<title>掃晴娘 · 66 Style Explorations</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Instrument+Serif&family=Noto+Serif+SC:wght@400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#08080c;color:#e8e6f0;font-family:'DM Sans',system-ui,sans-serif;min-height:100vh;padding:0 0 80px}
.hero{text-align:center;padding:56px 24px 40px;background:linear-gradient(180deg,#1a1028 0%,#08080c 100%)}
.hero h1{font-family:'Noto Serif SC','Instrument Serif',serif;font-size:42px;font-weight:400;background:linear-gradient(135deg,#e8d5b7,#f0c8a0,#d4a574);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:2px}
.hero .en{font-family:'Instrument Serif',serif;font-size:18px;color:#887868;margin-top:4px;font-style:italic}
.hero .sub{font-size:13px;color:#665e56;margin-top:16px;line-height:1.6;max-width:340px;margin-left:auto;margin-right:auto}
.grid{max-width:430px;margin:0 auto;padding:0 16px;display:flex;flex-direction:column;gap:20px}
.card{border-radius:20px;overflow:hidden;border:1px solid #1e1e28;background:#111118}
.card-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 0}
.card-num{font-size:11px;font-weight:700;letter-spacing:2px;color:#555}
.card-tag{padding:4px 10px;border-radius:10px;font-size:10px;font-weight:600;letter-spacing:0.5px}
.card-body{padding:12px 20px 20px}
.card-title{font-family:'Instrument Serif',serif;font-size:22px;margin-bottom:2px}
.card-zh{font-family:'Noto Serif SC',serif;font-size:13px;color:#887060;margin-bottom:12px}
.prompt-box{
  background:#0c0c14;
  border:1px solid #222233;
  border-radius:12px;
  padding:14px 16px;
  font-size:13px;
  color:#c8c0d8;
  line-height:1.65;
  position:relative;
  cursor:pointer;
  transition:border-color .2s;
}
.prompt-box:hover{border-color:#7a6aa0}
.prompt-box::after{
  content:'📋 Tap to copy';
  position:absolute;
  top:8px;
  right:10px;
  font-size:10px;
  color:#555;
  pointer-events:none;
}
.prompt-box.copied{border-color:#4ade80}
.prompt-box.copied::after{content:'✓ Copied!';color:#4ade80}
.refs{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.ref-link{font-size:11px;color:#7a6aa0;text-decoration:none;padding:3px 10px;border-radius:8px;background:#1a1624}
.divider{text-align:center;padding:30px 0;font-size:12px;letter-spacing:4px;color:#333}

/* Generated images gallery */
.gen-images{display:flex;gap:8px;margin-top:14px;overflow-x:auto;padding-bottom:4px;scroll-snap-type:x mandatory}
.gen-item{flex-shrink:0;width:140px;scroll-snap-align:start}
.gen-item img,.gen-item video{width:140px;height:100px;object-fit:cover;border-radius:10px;border:1px solid #222;display:block}
.gen-item video{cursor:pointer}
.gen-label{font-size:10px;color:#666;text-align:center;margin-top:4px;font-weight:600;letter-spacing:0.5px}
.gen-images::-webkit-scrollbar{display:none}

/* Chips nav */
.chips{
  position:sticky;
  top:0;
  z-index:100;
  display:flex;
  gap:8px;
  padding:12px 16px;
  overflow-x:auto;
  -webkit-overflow-scrolling:touch;
  background:rgba(8,8,12,0.85);
  backdrop-filter:blur(12px);
  border-bottom:1px solid #1a1a24;
  max-width:430px;
  margin:0 auto;
}
.chips::-webkit-scrollbar{display:none}
.chip{
  flex-shrink:0;
  padding:6px 14px;
  border-radius:20px;
  border:1px solid #2a2a35;
  background:transparent;
  color:#888;
  font-family:inherit;
  font-size:12px;
  font-weight:500;
  cursor:pointer;
  transition:all .2s;
  white-space:nowrap;
}
.chip:active{transform:scale(0.95)}
.chip.active{background:#7a6aa0;border-color:#7a6aa0;color:#fff}
.chip .chip-num{opacity:0.5;margin-right:4px;font-size:10px}

/* Fullscreen lightbox */
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,0.95);z-index:9999;display:none;align-items:center;justify-content:center;padding:20px;flex-direction:column}
.lightbox.show{display:flex}
.lightbox img,.lightbox video{max-width:100%;max-height:80vh;object-fit:contain;border-radius:12px}
.lightbox-label{color:#888;font-size:13px;margin-top:12px;font-weight:500}
.lightbox-close{position:absolute;top:16px;right:16px;width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,0.1);border:none;color:#fff;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.lightbox-nav{position:absolute;top:50%;transform:translateY(-50%);width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,0.1);border:none;color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.lightbox-prev{left:12px}
.lightbox-next{right:12px}

  card.innerHTML = `
    <div class="card-head">
      <div class="card-num">${String(i+1).padStart(2,'0')}</div>
      <div class="card-tag" style="background:${s.tagBg};color:${s.tagColor}">${s.tag}</div>
    </div>
    <div class="card-body">
      <div class="card-title">${s.title}</div>
      <div class="card-zh">${s.zh}</div>
      ${imagesHtml}
      <div class="prompt-box" data-prompt="${encodeURIComponent(s.prompt)}">${s.prompt}</div>
      <div class="refs">${refsHtml}</div>
    </div>
  `;
  grid.appendChild(card);
});

// Chips nav
const chipsEl = document.getElementById('chips');
STYLES.forEach((s, i) => {
  const chip = document.createElement('button');
  chip.className = 'chip';
  chip.innerHTML = `<span class="chip-num">${String(i+1).padStart(2,'0')}</span>${s.title}`;
  chip.onclick = () => {
    const card = grid.children[i];
    if (card) {
      card.scrollIntoView({ behavior: 'smooth', block: 'start' });
      // Update active chip
      document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
    }
  };
  chipsEl.appendChild(chip);
});

// Update active chip on scroll
const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      const idx = Array.from(grid.children).indexOf(entry.target);
      if (idx >= 0) {
        document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
        const activeChip = chipsEl.children[idx];
        if (activeChip) {
          activeChip.classList.add('active');
          activeChip.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
        }
      }
    }
  });
}, { threshold: 0.5 });

Array.from(grid.children).forEach(card => observer.observe(card));

// Lightbox
let lbStyle = 0, lbIdx = 0;

function openLB(styleIdx, imgIdx) {
  lbStyle = styleIdx;
  lbIdx = imgIdx;
  renderLB();
  document.getElementById('lightbox').classList.add('show');
}

function closeLB() {
  document.getElementById('lightbox').classList.remove('show');
  // Stop any playing video
  const v = document.querySelector('#lbContent video');
  if (v) v.pause();
}

function navLB(dir) {
  const imgs = STYLES[lbStyle].images;
  if (!imgs) return;
  lbIdx = (lbIdx + dir + imgs.length) % imgs.length;
  renderLB();
}

function renderLB() {
  const imgs = STYLES[lbStyle].images;
  if (!imgs || !imgs[lbIdx]) return;
  const img = imgs[lbIdx];
  const content = document.getElementById('lbContent');
  const label = document.getElementById('lbLabel');
  
  if (img.type === 'video') {
    content.innerHTML = `<video src="${img.src}" playsinline loop autoplay controls style="max-width:100%;max-height:80vh;border-radius:12px"></video>`;
  } else {
    content.innerHTML = `<img src="${img.src}" style="max-width:100%;max-height:80vh;border-radius:12px">`;
  }
  label.textContent = `${STYLES[lbStyle].title} · ${img.label}`;
}

// Swipe support for lightbox
let lbTouchStart = null;
document.getElementById('lightbox').addEventListener('touchstart', e => {
  lbTouchStart = e.touches[0].clientX;
});
document.getElementById('lightbox').addEventListener('touchend', e => {
  if (lbTouchStart === null) return;
  const diff = e.changedTouches[0].clientX - lbTouchStart;
  if (Math.abs(diff) > 50) navLB(diff < 0 ? 1 : -1);
  lbTouchStart = null;
});

// Copy on tap
document.querySelectorAll('.prompt-box').forEach(box => {
  box.addEventListener('click', async () => {
    const text = decodeURIComponent(box.dataset.prompt);
    try {
      await navigator.clipboard.writeText(text);
      box.classList.add('copied');
      setTimeout(() => box.classList.remove('copied'), 2000);
    } catch {
      // Fallback
      const ta = document.createElement('textarea');
      ta.value = text;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      box.classList.add('copied');
      setTimeout(() => box.classList.remove('copied'), 2000);
    }
  });
});
</script>
</body>
