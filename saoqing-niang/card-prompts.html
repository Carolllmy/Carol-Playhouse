<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>掃晴娘 · 60 Card UI Prompts</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Instrument+Serif&family=Noto+Serif+SC:wght@400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#08080c;color:#e8e6f0;font-family:'DM Sans',system-ui,sans-serif;min-height:100vh;padding:0 0 80px}
.hero{text-align:center;padding:56px 24px 40px;background:linear-gradient(180deg,#0f1a28 0%,#08080c 100%)}
.hero h1{font-family:'Noto Serif SC','Instrument Serif',serif;font-size:36px;font-weight:400;background:linear-gradient(135deg,#a8c8e8,#80b0d8,#6090c0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:2px}
.hero .en{font-family:'Instrument Serif',serif;font-size:16px;color:#607888;margin-top:4px;font-style:italic}
.hero .sub{font-size:13px;color:#506068;margin-top:16px;line-height:1.6;max-width:360px;margin-left:auto;margin-right:auto}
.chips{position:sticky;top:0;z-index:100;display:flex;gap:8px;padding:12px 16px;overflow-x:auto;-webkit-overflow-scrolling:touch;background:rgba(8,8,12,0.85);backdrop-filter:blur(12px);border-bottom:1px solid #1a1a24;max-width:430px;margin:0 auto}
.chips::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:6px 14px;border-radius:20px;border:1px solid #2a2a35;background:transparent;color:#888;font-family:inherit;font-size:12px;font-weight:500;cursor:pointer;transition:all .2s;white-space:nowrap}
.chip:active{transform:scale(0.95)}
.chip.active{background:#4a6a8a;border-color:#4a6a8a;color:#fff}
.chip .chip-num{opacity:0.5;margin-right:4px;font-size:10px}
.grid{max-width:430px;margin:0 auto;padding:0 16px;display:flex;flex-direction:column;gap:20px}
.card{border-radius:20px;overflow:hidden;border:1px solid #1e1e28;background:#111118}
.card-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 0}
.card-num{font-size:11px;font-weight:700;letter-spacing:2px;color:#555}
.card-tag{padding:4px 10px;border-radius:10px;font-size:10px;font-weight:600;letter-spacing:0.5px}
.card-body{padding:12px 20px 20px}
.card-title{font-family:'Instrument Serif',serif;font-size:20px;margin-bottom:10px}
.prompt-box{background:#0c0c14;border:1px solid #222233;border-radius:12px;padding:14px 16px;font-size:13px;color:#c8c0d8;line-height:1.65;position:relative;cursor:pointer;transition:border-color .2s}
.prompt-box:hover{border-color:#4a6a8a}
.prompt-box::after{content:'📋 Tap to copy';position:absolute;top:8px;right:10px;font-size:10px;color:#555;pointer-events:none}
.prompt-box.copied{border-color:#4ade80}
.prompt-box.copied::after{content:'✓ Copied!';color:#4ade80}
.divider{text-align:center;padding:30px 0;font-size:12px;letter-spacing:4px;color:#333}
</style>
</head>
<body>

<div class="hero">
  <h1>Card UI × 60 Styles</h1>
  <div class="en">Each style applied to a card with header, body copy & two buttons</div>
  <div class="sub">Tap any prompt to copy. Paste into ChatGPT, Gemini, or Grok to generate the card UI design.</div>
</div>

<div class="chips" id="chips"></div>
<div class="grid" id="grid"></div>
<div class="divider">· · · 🃏 · · ·</div>

<script>
const STYLES = [
  { n:"Ghibli Watercolor", tag:"DREAMY", tagBg:"#ffffff20", tagColor:"#c8dae8",
    p:"Design a card UI component in Studio Ghibli watercolor style. The card has soft watercolor wash background with visible paper grain texture. Header text in hand-lettered brush font reading 'Good Morning'. Body copy in gentle serif: 'The clouds are clearing and sunshine is on its way. A perfect day to hang your wishes outside.' Two buttons at the bottom: primary button 'Make a Wish' with watercolor fill in cerulean blue, secondary button 'Maybe Later' as outlined text. Soft pencil outlines on the card edges. Wet-on-wet color bleeds at corners. The card feels like a page torn from a Miyazaki storyboard. Warm, nostalgic, hand-painted. Card dimensions roughly 350×500px on cream paper background."},
  { n:"Chinese Ink Wash", tag:"SERENE", tagBg:"#4a3c2e20", tagColor:"#6b5840",
    p:"Design a card UI component in traditional Chinese ink wash (水墨) style. White rice paper card with visible fiber texture. Header in bold sumi ink brush calligraphy: '晴' (Clear Sky). Body copy in elegant Song typeface: 'The morning mist lifts gently from the mountain, revealing blue sky beyond the clouds.' Two buttons: primary button with ink wash fill and white text 'Begin', secondary button as a simple ink outline 'Dismiss'. The card border is a single confident brush stroke that forms an imperfect rectangle. A small red seal stamp in the corner. Ink occasionally feathers where it touches the wet paper. Contemplative, scholarly, timeless. Negative space is as important as the ink."},
  { n:"Chinese Paper Cut", tag:"FOLK", tagBg:"#ff444420", tagColor:"#ff8888",
    p:"Design a card UI component in Chinese paper cutting (剪紙) art style. Vermillion red card with intricate white cutout patterns forming the border — clouds, flowers, and rain motifs. Header cut out in bold: '好天氣' (Good Weather). Body text in white on red: 'The Cloud-Sweeping Lady has heard your prayer. Fair skies arrive with the morning light.' Two buttons: primary is white cutout on red 'Celebrate', secondary is red outlined on white background 'Return'. Decorative paper-cut swallows in the corners. Sharp geometric edges, perfect symmetry. The card looks like it could be held up to light with the cutouts glowing through. Festive, auspicious."},
  { n:"Kawaii Character", tag:"CUTE", tagBg:"#e91e6320", tagColor:"#f06292",
    p:"Design a card UI component in kawaii Japanese style. Soft pink gradient card with rounded corners (24px radius). A tiny cute 掃晴娘 doll illustration peeks from the top edge. Header in bubbly rounded font: 'Sunny Day! ☀️' with a sparkle emoji. Body copy in friendly sans-serif: 'The weather doll is smiling today! Looks like it's going to be a beautiful day for an adventure~' Two buttons: primary button in coral pink with white text and a tiny star icon '✨ Let's Go!', secondary button in soft outline 'Not Now'. Small decorative elements: floating hearts, stars, and a tiny rainbow. Blush pink color palette. The card radiates joy."},
  { n:"Apple Minimalist", tag:"MINIMAL", tagBg:"#00000020", tagColor:"#999",
    p:"Design a card UI component in Apple's Human Interface design language. Pure white card with ultra-subtle shadow (0 2px 8px rgba(0,0,0,0.06)). 16px corner radius. Header in SF Pro Display Semibold 22px: 'Weather Update'. Body in SF Pro Text Regular 15px, secondary grey (#86868b): 'Current conditions show clearing skies with temperatures rising through the afternoon.' Two buttons: primary is a full-width rounded rectangle in system blue (#007AFF) with white text 'View Details', secondary is text-only blue link 'Dismiss'. Generous padding (24px). No decoration, no icons unless functional. The card should feel like it belongs in iOS Settings. Pixel-perfect, Retina-ready."},
  { n:"3D Clay / Pixar", tag:"TACTILE", tagBg:"#d4906020", tagColor:"#d4a060",
    p:"Design a card UI component that looks like a 3D clay/ceramic tablet. The card appears to be a physical slab of smooth white clay with softly rounded edges and subtle fingerprint impressions. Header is embossed into the clay surface: 'Weather Report'. Body text appears pressed/stamped into the clay: 'Gentle winds carry the clouds eastward, leaving clear skies for the afternoon.' Two buttons are raised clay bumps at the bottom: primary button is a warm terracotta clay oval with pressed text 'Check Now', secondary is a lighter clay oval 'Later'. Soft studio lighting from above creates shadows in the embossed text. Shallow depth of field. The card has weight and materiality."},
  { n:"Pixel Art 8-Bit", tag:"RETRO", tagBg:"#4ade8020", tagColor:"#4ade80",
    p:"Design a card UI component in 8-bit pixel art style. Dark navy background card with a chunky pixel border in bright green. Header in pixel font (8px grid): 'STATUS: CLEAR' in bright green monospace text. Body in smaller pixel font: 'SCANNING SKY... ALL CLEAR. SUNSHINE PROBABILITY: 95%. RECOMMENDED: GO OUTSIDE.' Two buttons as pixel rectangles: primary '[A] ACCEPT' in green with white text, secondary '[B] CANCEL' in darker outline. A tiny pixel weather icon (sun with rays) in the top corner. CRT scan line overlay. The card looks like a Game Boy dialog box or a retro RPG menu screen. 4-color palette only."},
  { n:"Ukiyo-e Woodblock", tag:"DRAMATIC", tagBg:"#9b59b620", tagColor:"#c8a8e8",
    p:"Design a card UI component as a Japanese ukiyo-e woodblock print. The card background shows wood grain texture with indigo ink. Header in bold Japanese woodblock title style: '天気予報' (Weather Forecast). Body text in vertical Japanese text columns (or horizontal English): 'The great wave of clouds retreats beyond the mountain. Tomorrow brings the blessing of clear skies and gentle winds.' Two buttons: primary is a vermillion red cartouche shape with white text '続く' (Continue), secondary is an outlined cartouche '戻る' (Return). Stylized wave patterns at the bottom edge. Color registration slightly offset as in authentic multi-block printing. Bold, graphic, museum-worthy."},
  { n:"Art Deco Glamour", tag:"LUXE", tagBg:"#d4a06020", tagColor:"#d4a060",
    p:"Design a card UI component in 1920s Art Deco style. Black card with gold geometric border — stepped lines, chevrons, and fan motifs. Header in an authentic Art Deco typeface with inline details: 'FORECAST' with gold leaf effect. Body in elegant serif with generous letter-spacing: 'The skies clear with magnificent radiance. A golden evening awaits those who venture forth.' Two buttons: primary is a gold-filled geometric shape (hexagon or arch) with black text 'PROCEED', secondary is gold-outlined 'DECLINE'. Symmetrical sunburst rays emanate from behind the header. Gold foil stamping texture on all metallic elements. The card feels like a luxury invitation from The Great Gatsby."},
  { n:"Single Line Drawing", tag:"POETIC", tagBg:"#00000020", tagColor:"#999",
    p:"Design a card UI component where every element is drawn in one continuous single-line style. White card, all elements rendered in a single-weight brown ink line. Header text 'A Clear Day' written in connected cursive that flows into the body text without lifting the pen: 'The sky opens like a letter, unfolding blue above the rooftops.' The line continues to form two button outlines at the bottom: 'Read More' and 'Close' — the line connects them both. Line weight varies slightly with natural pen pressure. The entire card is one continuous drawing. Minimal, poetic, Muji aesthetic. The line is warm dark brown on cream white."},
  { n:"Children's Book", tag:"WARM", tagBg:"#c8906020", tagColor:"#c8a060",
    p:"Design a card UI component in children's picture book illustration style. Cream textured paper card with slightly wobbly hand-drawn border in colored pencil. Header in playful hand-lettered crayon: 'Look Outside!' with a tiny drawn sun. Body in gentle handwriting font: 'The little weather doll smiled and swayed, because she knew the rain had gone away. Time to play!' Two buttons drawn as crayon-colored rectangles: primary in cheerful yellow 'Let's Play!', secondary in soft blue outline 'Stay Inside'. Small colored pencil illustrations in corners — a bird, a flower, a cloud. Colors go slightly outside the lines. Warm, safe, bedtime-story feeling."},
  { n:"Blue & White Porcelain", tag:"PRECIOUS", tagBg:"#2a508020", tagColor:"#5a8ac0",
    p:"Design a card UI component in Chinese blue-and-white porcelain (青花瓷) style. White glazed card surface with all decorative elements and text in cobalt blue. Header in traditional Chinese calligraphy: '天朗氣清' (Clear Sky, Fine Air). Body text in elegant blue: 'The porcelain sky holds no clouds today. The wind carries only the scent of plum blossoms across the courtyard.' Two buttons: primary is a cobalt blue filled oval with white text 'Continue', secondary is blue-outlined 'Return'. Intricate blue floral border — peony and cloud scroll motifs. Fine craquelure cracks across the glazed surface. One crack repaired with gold kintsugi. The card IS the porcelain."},
  { n:"Glassmorphism", tag:"MODERN", tagBg:"#667eea30", tagColor:"#99aaff",
    p:"Design a card UI component in glassmorphism style. Frosted glass card with background blur (backdrop-filter: blur(20px)) floating over a colorful gradient sky (purple to orange sunset). White border (1px solid rgba(255,255,255,0.2)). Header in white SF Pro Bold: 'Weather Now'. Body in white with slight transparency: 'Skies clearing through the afternoon with temperatures reaching 72°F. UV index moderate.' Two buttons: primary is a slightly more opaque frosted glass with white text 'View Full Forecast', secondary is transparent with white border 'Dismiss'. Subtle inner glow. Water droplets on the glass surface from recent rain. The gradient sky is visible through the card. Premium iOS feel."},
  { n:"Paper Craft Diorama", tag:"CRAFT", tagBg:"#8b6b4a20", tagColor:"#a08058",
    p:"Design a card UI component as a paper craft diorama. The card is a physical box made of layered cardstock — the front face has a cut-out window revealing paper layers behind. Header is cut from dark cardstock and glued on: 'Weather Scene'. Body text is printed on a paper strip layered inside the box: 'Layered clouds part to reveal sunshine. Each layer tells a different story of the sky.' Two buttons are paper tabs that look like they could be pulled: primary tab in colored paper 'Open', secondary tab in kraft paper 'Close'. Real shadows cast between paper layers. Accordion-folded elements add depth. Everything is made of paper and glue. Photographed with warm directional light."},
  { n:"Neon Glow", tag:"URBAN", tagBg:"#00d4ff20", tagColor:"#00d4ff",
    p:"Design a card UI component in neon sign style on a dark brick wall. The card outline is a cyan neon tube mounted on a dark surface. Header in hot pink neon tubes: 'TONIGHT' with visible tube mounting brackets. Body in smaller white neon: 'Clear skies expected through midnight. Perfect night for a walk.' Two buttons: primary glows in green neon 'GO OUT', secondary in dim red neon 'STAY IN'. Each letter has the characteristic neon glow — bright core with soft bloom. Reflections on wet brick surface below. The card is mounted on a dark alley wall. One letter in the body text flickers slightly. Rain puddle on the ground reflects the neon. Tokyo back-alley atmosphere. Cinematic."},
  { n:"Botanical Specimen", tag:"ORGANIC", tagBg:"#2e7d3220", tagColor:"#60a060",
    p:"Design a card UI component as a botanical illustration specimen plate. Aged cream paper card with fine-line engraved border. Header in copperplate engraving script: 'Meteorological Observations'. Body in elegant serif with scientific precision: 'Specimen observed under clearing conditions. Cumulus formations dissipating at 3,000ft. Atmospheric pressure rising steadily.' Two buttons styled as scientific classification labels: primary is a filled herbarium label 'Record Observation', secondary is an outlined label 'Discard'. Tiny botanical illustrations in margins — pressed flowers, leaf specimens. Annotation marks with thin leader lines. The card looks like a page from a 19th century naturalist's field journal."},
  { n:"Embroidery on Linen", tag:"HANDMADE", tagBg:"#8b5e3c20", tagColor:"#b08060",
    p:"Design a card UI component that looks entirely embroidered on natural linen fabric. The card border is chain stitch in indigo thread. Header in satin stitch lettering: 'Weather Today' in rust-colored thread. Body text in tiny back stitch: 'The sun breaks through the morning clouds, warming the garden below.' Two buttons: primary is a filled satin-stitch rectangle in sage green thread with backstitch white text 'View', secondary is an outlined running-stitch rectangle 'Close'. Small cross-stitch decorative elements — a sun, a cloud, a raindrop. The linen weave texture is visible everywhere. Thread has slight dimensional shadow above the fabric. French knot dots as bullet points. Photographed flat on a craft table."},
  { n:"Shadow Puppet Theatre", tag:"ANCIENT", tagBg:"#e8d0a020", tagColor:"#d4b880",
    p:"Design a card UI component as a shadow puppet theatre screen. The card is a translucent screen backlit by warm amber light. Header is a shadow silhouette of ornate Chinese characters: '天氣' (Weather). Body text appears as shadow text projected onto the screen: 'Behind the screen of clouds, the sun waits patiently. The puppet master pulls the strings of wind to clear the stage.' Two buttons are shadow puppet levers at the bottom: primary lever 'Watch' and secondary lever 'Exit'. Intricate perforated leather puppet decorations frame the card — flowers and cloud motifs that glow with colored light. The warm amber backlight creates a magical glow."},
  { n:"Pastel Gradient Dream", tag:"ETHEREAL", tagBg:"#8868a820", tagColor:"#a888c8",
    p:"Design a card UI component made of pure soft gradient light. The card has no hard edges — it's a softly glowing rectangular form that fades from lavender at top to peach at bottom. Header text in thin white font that seems to emit light: 'Breathe'. Body text in whisper-thin white: 'The sky holds its colors gently today. Lavender dawn fading into golden afternoon. Everything is soft.' Two buttons as subtle glass-like pill shapes: primary has a slightly brighter glow 'Feel It', secondary is barely visible 'Not Now'. Floating bokeh light particles drift across the card. No borders, no sharp lines — everything dissolves at edges. The card feels like a lucid dream. ASMR for the eyes."},
  { n:"Mixed Media Collage", tag:"EXPERIMENTAL", tagBg:"#c8a87820", tagColor:"#c8a878",
    p:"Design a card UI component as a mixed media collage. The card background combines torn vintage newspaper, a watercolor wash, and a strip of washi tape. Header is rubber-stamped in red ink: 'WEATHER REPORT'. Body text is typewriter-typed on a strip of white paper, slightly askew, taped onto the collage: 'Satellite shows clearing patterns. Grandmother says her knee agrees. Tomorrow will be beautiful.' Two buttons: primary is a torn piece of colored paper with hand-written 'Yes →', secondary is a small sticky note with 'No'. A pressed flower is tucked in the corner. A real photograph fragment shows a sky. Elements overlap naturally. Everything feels personally assembled."},
  { n:"3D Character Model", tag:"3D", tagBg:"#6366f120", tagColor:"#818cf8",
    p:"Design a card UI component rendered as a 3D floating panel in a Blender viewport. The card is a slightly curved 3D rectangle with PBR white material, subtle reflection, and soft shadow on a grey studio floor. Header in extruded 3D text with beveled edges: 'Render Complete'. Body as flat text mapped onto the card surface: 'Scene analysis shows optimal lighting conditions. Cloud density at 12%. Recommended: outdoor rendering.' Two buttons as 3D pill-shaped objects sitting on the card surface: primary in blue material 'Render', secondary in grey wireframe 'Cancel'. Viewport gizmo visible in corner. The card has thickness and casts a real shadow. HDRI studio lighting."},
  { n:"Designer Toy / Pop Mart", tag:"COLLECTIBLE", tagBg:"#f59e0b20", tagColor:"#f59e0b",
    p:"Design a card UI component styled as a premium designer toy packaging insert. Glossy coated cardstock with a pearl white iridescent finish. Header in a playful custom typeface: 'Series 01: Weather'. Body in clean sans-serif: 'Collect all weather states. This edition: Clear Sky. Rare probability: 1 in 12. Keep in original packaging for maximum value.' Two buttons as embossed shapes: primary is a holographic foil sticker shape 'Collect', secondary is matte 'Trade'. A small authentication hologram in the corner. Barcode at bottom. The card has the premium feel of unboxing a limited-edition collectible. Product photography on gradient background."},
  { n:"Jellycat Plushie", tag:"SOFT", tagBg:"#f9a8d420", tagColor:"#f9a8d4",
    p:"Design a card UI component that looks like a soft fabric tag sewn onto plush material. The card background is marshmallow-soft plush texture in cream white. Header is embroidered in pink thread: 'Cozy Update'. Body is printed on a small sewn-in fabric care label: 'Today feels soft and warm. Perfect weather for staying in with tea and a blanket. Or maybe a walk if you bundle up.' Two buttons are soft fabric patches: primary is a pink velvet patch 'Snuggle', secondary is a cream linen patch 'Nap'. The edges of the card are overlock-stitched. A small satin ribbon bow decorates the top. Everything has that soft, touchable plush material quality."},
  { n:"Crochet Amigurumi", tag:"HANDCRAFT", tagBg:"#a78bfa20", tagColor:"#a78bfa",
    p:"Design a card UI component that looks like a crocheted piece. The card is a rectangular crochet swatch in white cotton yarn — every stitch visible. Header is cross-stitched onto the crochet background in purple yarn: 'Stitch Report'. Body is a smaller cross-stitch pattern spelling out: 'Chain 5, single crochet the clouds away. Sunny with a chance of yarn.' Two buttons are small crocheted squares sewn onto the bottom: primary in coral yarn 'Hook In', secondary in mint yarn 'Unravel'. A tiny crochet hook rests at the edge. The yarn has that characteristic cotton fiber halo. Photographed flat on a wooden surface with yarn balls nearby."},
  { n:"Photorealistic", tag:"REAL", tagBg:"#10b98120", tagColor:"#10b981",
    p:"Design a card UI component as a real physical printed card — a weathered postcard photographed on a wooden table. The card is actual cardstock, slightly bent at one corner, with a coffee ring stain. Header is letterpress-printed in deep navy: 'Weather Postcard'. Body is handwritten in blue ballpoint pen with natural handwriting imperfections: 'Dear friend, the weather here is finally clearing up. You should visit soon — the cherry blossoms are almost ready.' Two buttons are rubber-stamped at the bottom: primary stamp in green ink 'APPROVED ✓', secondary stamp in grey 'RETURN TO SENDER'. A real postage stamp in the corner. Postmark date visible. Shot on 85mm lens, f/2.0, shallow depth of field."},
  { n:"Futuristic / Sci-Fi", tag:"FUTURE", tagBg:"#06b6d420", tagColor:"#06b6d4",
    p:"Design a card UI component as a holographic heads-up display from 2150. Transparent glass panel floating in space with cyan edge glow. Header in a futuristic HUD font with scan line animation: 'ATMOSPHERIC SCAN'. Body in monospace with data readout styling: 'CLOUD COVERAGE: 12% ▼ | TEMP: 22.4°C ▲ | HUMIDITY: 45% — | WIND: 8km/h NW | UV INDEX: 6.2 MODERATE'. Two buttons as holographic touch targets with hexagonal shapes: primary pulses cyan 'EXECUTE SCAN', secondary dims 'ABORT'. Tiny data particles float around the card. Translucent layers show depth. Circuit-line decorative patterns at edges. Blade Runner UI aesthetic."},
  { n:"80s Synthwave", tag:"RETRO-FUTURE", tagBg:"#ec489920", tagColor:"#ec4899",
    p:"Design a card UI component in 80s synthwave aesthetic. Dark purple gradient card with a neon grid receding to a horizon at the bottom. Header in chrome 3D text with scan lines: 'WEATHER WAVE' with hot pink glow. Body in retro digital LCD font in cyan: 'SCANNING THE AIRWAVES... CLEAR SKIES DETECTED. TEMPERATURE RISING. SUNSET PROBABILITY: 100%.' Two buttons: primary is a chrome-finish rectangle with hot pink outline glow 'ENGAGE', secondary is outlined in cyan 'EJECT'. A huge segmented retro sun sets behind the text. Palm tree silhouettes at edges. VHS tracking artifacts at top and bottom. The entire card looks like a paused VHS tape from 1986."},
  { n:"Retro Disco", tag:"GROOVY", tagBg:"#f9731620", tagColor:"#f97316",
    p:"Design a card UI component in 1970s disco style. The card background is a metallic gold with mirror-ball light reflections dancing across it. Header in a funky curved 70s typeface: 'Weather Fever' with a rainbow gradient. Body in a groovy rounded font: 'Baby, the forecast is HOT. Clear skies, warm nights, and a funky beat in the air. Get your dancing shoes ready.' Two buttons on a checkerboard strip at the bottom: primary is a glitter-finish circle 'Boogie', secondary is outlined 'Sit Down'. Colored light spots (magenta, gold, blue) scatter across the card from a disco ball. The card has that warm 70s film stock color grade — orange-shifted with soft halation."},
  { n:"Cinematic Film Still", tag:"CINEMA", tagBg:"#78716c20", tagColor:"#a8a29e",
    p:"Design a card UI component as a frame from an art-house film. The card is letterboxed at 2.39:1 aspect ratio with black bars. Color graded in teal and orange — shadows pushed to deep teal, highlights warm amber. Header in a minimal serif film title font: 'Act III: Clearing'. Body in subtitle-style text at the bottom third: 'She watched the last clouds retreat beyond the horizon, knowing tomorrow would bring the sun she had wished for.' Two buttons as minimal text links in the lower right: primary 'Next Scene →', secondary 'Credits'. Anamorphic lens bokeh (oval-shaped) visible. Film grain from Kodak 500T stock. The card IS a movie frame. Wong Kar-wai color, A24 typography."},
  { n:"Stained Glass Window", tag:"SACRED", tagBg:"#eab30820", tagColor:"#eab308",
    p:"Design a card UI component as a stained glass window panel. The card is composed of colored glass pieces held together by dark lead came lines. Header in Gothic blackletter formed by glass pieces: 'Providence'. Body text in a scroll-shaped clear glass panel with painted text: 'The light breaks through the clouds as through cathedral glass, painting the world in color.' Two buttons as small glass medallions at the bottom: primary is a ruby red glass circle 'Enter', secondary is a sapphire blue circle 'Pray'. Surrounding decorative glass — cobalt blue sky, golden sun rays, green vine borders. Light streams through from behind making every piece glow with jewel-like intensity."},
  { n:"Watercolor Tattoo", tag:"BODY ART", tagBg:"#ef444420", tagColor:"#f87171",
    p:"Design a card UI component in watercolor tattoo style on skin. The card outline is bold black linework on realistic skin surface. Header in tattoo script lettering: 'Weather Ink'. Body in clean tattoo-style small text: 'Some days are storms, some days are sunshine. Both are beautiful when you wear them on your skin.' Two buttons as tattoo flash designs: primary is a banner scroll with 'Accept' in traditional tattoo lettering, secondary is a simple text 'Fade'. Watercolor splashes in turquoise and coral burst beyond the card borders. Ink sits differently on the skin surface — slight sheen of fresh tattoo. Visible skin pores and texture."},
  { n:"Lego Minifigure", tag:"PLAY", tagBg:"#facc1520", tagColor:"#facc15",
    p:"Design a card UI component built entirely from Lego bricks. The card is a flat Lego baseplate with raised brick borders. Header is spelled out in individual 1×1 letter tiles: 'BUILD'. Body text is a printed 2×4 tile piece: 'Clear skies mean perfect building weather. Time to construct something amazing.' Two buttons are clickable Lego pieces: primary is a bright red 2×4 brick labeled 'Build!', secondary is a grey 2×4 brick 'Store'. Small Lego accessories decorate the card — a tiny sun brick, cloud pieces, a minifigure weather reporter. Shot on a Lego table with depth of field blur on background bricks. Authentic Lego product photography."},
  { n:"Bauhaus Geometry", tag:"DESIGN", tagBg:"#ef444420", tagColor:"#ef4444",
    p:"Design a card UI component in Bauhaus design school style. White card with strict grid system. Header in Futura Extra Bold, all caps, left-aligned: 'WETTER' (Weather in German). Body in DIN regular: 'Form follows function. The sky clears because it must. Temperature rises because it is logical. No ornament needed.' Two buttons as pure geometric shapes: primary is a red circle with white text 'JA', secondary is a blue square outline with black text 'NEIN'. A yellow triangle accent in the top corner. Only primary colors (red, blue, yellow) plus black and white. All elements align to a visible grid. Moholy-Nagy would approve."},
  { n:"Swiss International Style", tag:"GRID", tagBg:"#33333320", tagColor:"#999",
    p:"Design a card UI component in Swiss International Typographic Style. Pure white card. Header in Helvetica Neue Bold 24px, flush left: 'Weather Report'. Body in Helvetica Neue Regular 14px with 1.6 line-height, flush left ragged right: 'Skies clearing from the west. Temperature 18°C rising. Humidity falling to 45%. Wind northwest at 12 km/h.' Two buttons: primary is a full-width black rectangle with white Helvetica text 'Continue', secondary is text-only black 'Back'. A single red horizontal rule separates header from body. Grid lines faintly visible. Asymmetric layout. Maximum information, zero decoration. Josef Müller-Brockmann approved."},
  { n:"Digital Brutalism", tag:"RAW", tagBg:"#ff660020", tagColor:"#ff6600",
    p:"Design a card UI component in digital brutalist web design style. Thick black border (4px solid black). No border radius. Header in Times New Roman Bold: 'WEATHER.TXT'. Body in Courier monospace on lime green background: '> checking sky.api... OK\\n> clouds: NONE\\n> temp: 22C\\n> status: GO OUTSIDE NOW'. Two buttons as raw HTML-style inputs: primary is a default browser button 'SUBMIT', secondary is a hyperlink with underline 'go back'. Clashing colors — lime green, hot pink, cyan on white. A scrolling marquee element reads 'LIVE WEATHER DATA'. No rounded corners. No shadows. No gradient. Raw, confrontational, anti-design that's so ugly it's beautiful. Bloomberg Terminal energy."},
  { n:"Memphis Design", tag:"RADICAL", tagBg:"#8b5cf620", tagColor:"#8b5cf6",
    p:"Design a card UI component in 1980s Memphis Design Group style. The card clashes every pattern: background has terrazzo speckle in coral and teal, border zigzags in mustard yellow and lavender. Header in a funky geometric typeface: 'Radical Weather!' with each letter a different color. Body in a clean contrasting font: 'The forecast is totally tubular. Sunny skies, warm vibes, and zero percent chance of boring.' Two buttons break conventional placement — primary is a pink triangle shape with 'YES!' offset to the right, secondary is a teal circle with 'NAH' placed asymmetrically left. Confetti dots, squiggles, and lightning bolt decorations scattered everywhere. Ettore Sottsass would be proud."},
  { n:"Impressionist Oil", tag:"PAINTED", tagBg:"#6366f120", tagColor:"#818cf8",
    p:"Design a card UI component as an Impressionist oil painting. The entire card is thick impasto brush strokes on canvas — you can see the ridged paint texture. Header is painted in bold strokes of prussian blue: 'En Plein Air'. Body is softer strokes forming readable text: 'The light dances on the water today. Golden hour approaches. The garden awaits your presence among the water lilies.' Two buttons are distinct brush stroke patches: primary is a warm sunlit gold patch 'Paint', secondary is a cool shadow-blue patch 'Rest'. Visible canvas weave beneath thin paint areas. Dappled light effect across the card. The card IS an oil painting — Monet's garden on a UI component."},
  { n:"Expressionist", tag:"EMOTION", tagBg:"#dc262620", tagColor:"#ef4444",
    p:"Design a card UI component in German Expressionist painting style. Violent, angular, emotionally intense. The card background is slashed with acid yellow and blood red brush strokes. Header in jagged, distorted hand-painted lettering: 'DER STURM' (The Storm). Body in agitated handwriting: 'The sky screams with color. The wind tears at every surface. Nothing is calm. Nothing is still. But in chaos, there is beauty.' Two buttons carved aggressively: primary is a black angular slash with red text 'FEEL', secondary is scratched outline 'FLEE'. Paint drips down the card edges. The brush strokes are violent and visible. Munch's Scream meets weather report."},
  { n:"Renaissance Oil Painting", tag:"CLASSICAL", tagBg:"#92400e20", tagColor:"#d97706",
    p:"Design a card UI component as a Renaissance oil painting panel. The card is an aged wood panel with craquelure and gold leaf border. Header in illuminated manuscript capitals with gold leaf: 'Celestial Forecast'. Body in elegant Renaissance italic script: 'The heavens declare clear passage for all souls who venture forth this day. Mercury rises in the house of fair weather.' Two buttons as ornate cartouche shapes: primary is gold-leafed 'Proceed Hence', secondary is silver 'Remain'. Cherub faces in the corners. Sfumato soft-focus edges. The card is lit dramatically from upper left like a Caravaggio. Oil on wood panel, gallery lighting, gilded frame visible at edges."},
  { n:"Surrealism", tag:"DREAM", tagBg:"#7c3aed20", tagColor:"#a78bfa",
    p:"Design a card UI component in Dalí/Magritte surrealist style. The card appears normal at first glance but details are impossible — the text casts a shadow in the wrong direction, the border melts and drips off the bottom, clouds float INSIDE the card while blue sky is outside it. Header reads 'Ceci n'est pas la météo' (This is not the weather). Body: 'The sky is underground today. The rain falls upward. Your umbrella is a fish. Temperature: the color blue.' Two buttons: primary appears to recede INTO the card surface '?', secondary floats ABOVE the card 'Perhaps'. An eye watches from within the card. Hyper-realistic painting technique for impossible content."},
  { n:"Felt Craft", tag:"COZY", tagBg:"#f59e0b20", tagColor:"#f59e0b",
    p:"Design a card UI component made of layered felt pieces. The card base is a rectangle of thick cream wool felt with visible fiber texture. Header is cut from dark navy felt and blanket-stitched onto the base: 'Felt Forecast'. Body is smaller felt letters in brown stitched on: 'Warm and sunny. Perfect felt-crafting weather.' Alternatively, the body could be printed on a small fabric tag sewn on. Two buttons are small felt rectangles: primary in cheerful coral felt with white thread text 'Craft', secondary in sage green felt 'Rest'. Running stitch decorative border around the card. Small felt sun and cloud appliqués in corners. Everything has that fuzzy, warm felt texture. Photographed on cork board."},
  { n:"Balloon Sculpture", tag:"PARTY", tagBg:"#ec489920", tagColor:"#ec4899",
    p:"Design a card UI component made entirely of twisted balloons. The card frame is long balloons twisted into a rectangle shape. Header is balloon-letter art spelling 'PARTY WEATHER' in colorful twisted balloons. Body text appears on a flat rectangular balloon (like a balloon banner): 'It is a beautiful day for a celebration! Clear skies and warm breezes. Time to party!' Two buttons are round balloons: primary is a big red balloon 'Pop!', secondary is a smaller white balloon 'Float Away'. The balloons have that characteristic shiny latex surface with visible light reflections and tied knots. Confetti and streamers in the background. Shot at a party with bokeh lights."},
  { n:"Ceramic Glazed Sculpture", tag:"ARTISAN", tagBg:"#0ea5e920", tagColor:"#0ea5e9",
    p:"Design a card UI component as a ceramic tile or glazed plaque. The card is a handmade rectangular ceramic tile with reactive celadon glaze that pools beautifully in the recessed areas. Header is incised into the clay before firing, filled with iron oxide: 'Sky Report'. Body is stamped into the clay with moveable type before glazing: 'Clearing conditions. Kiln temperature: dropping. Glaze: settling to a perfect finish.' Two buttons are small raised clay bumps with underglaze text: primary in cobalt blue 'Fire', secondary in iron red 'Cool'. The glaze has beautiful crackle pattern and runs slightly at the bottom edge. Warm kiln light. Potter's studio shelf."},
  { n:"Paper Quilling Art", tag:"INTRICATE", tagBg:"#14b8a620", tagColor:"#14b8a6",
    p:"Design a card UI component created entirely from paper quilling. The card border is made of tight coils in graduated colors from white to sky blue. Header 'Weather Art' is formed by shaping paper strips into letterforms — each letter is a different quilling technique (tight coil, loose scroll, teardrop). Body text is printed on a small card placed in the center, framed by quilled decorations. Two buttons at the bottom: primary is a quilled sun burst shape in yellow and gold 'Shine', secondary is a quilled cloud shape in grey 'Drift'. Every quilled element casts real shadows. Hundreds of perfectly rolled paper strips. Shot in shadow box frame, museum lighting."},
  { n:"Film Noir B&W", tag:"NOIR", tagBg:"#27272a20", tagColor:"#a1a1aa",
    p:"Design a card UI component in 1940s film noir style. Pure black and white, high contrast. The card is lit by a single harsh light source creating dramatic shadows. Venetian blind shadows stripe across the entire card. Header in a hard-boiled detective novel typeface: 'The Forecast'. Body in typewriter font: 'The dame walked in and said the skies were clearing. I didn't believe her. In this city, nothing stays clear for long. But the barometer agreed.' Two buttons: primary is a bright white rectangle in the darkness 'Investigate', secondary is barely visible in shadow 'Walk Away'. Heavy film grain — Tri-X pushed to 1600. Dutch angle. Jazz smoke drifts across the bottom."},
  { n:"Wes Anderson Symmetry", tag:"WHIMSY", tagBg:"#fb923c20", tagColor:"#fb923c",
    p:"Design a card UI component in Wes Anderson's signature style. Perfectly symmetrical layout — dead center on a dusty pink background. The card is a cream-colored card with a thin mustard yellow border, perfectly centered. Header in Futura Bold, centered: 'Chapter 7: The Weather'. Body in Futura Book, centered: 'The barometric pressure suggested fair conditions. The concierge agreed. Lobby Boy confirmed independently.' Two buttons: perfectly symmetrical pill shapes centered at bottom — left is mint green 'Proceed', right is matching mint green 'Retreat'. The entire composition is obsessively centered and symmetric. Pantone-precise pastels. Grand Budapest Hotel title card energy."},
  { n:"Documentary Photography", tag:"TRUTH", tagBg:"#57534e20", tagColor:"#a8a29e",
    p:"Design a card UI component as a raw documentary photo with overlay text. The card background is an unprocessed photograph of a real sky — grey clouds with a break of blue visible. Shot handheld, slightly tilted. Header in plain white Impact font with black outline (like a news lower-third): 'LIVE: Weather Clearing'. Body in a news ticker style bar at the bottom: 'Meteorological service confirms clearing pattern — rain expected to stop within the hour. Temperatures rising.' Two buttons as simple text links: primary 'Full Report →', secondary 'Sources'. The image is raw and ungraded — true documentary colors. GPS coordinates and timestamp watermark in corner. Photojournalism aesthetic."},
  { n:"Macro Nature Photography", tag:"MICRO", tagBg:"#22c55e20", tagColor:"#22c55e",
    p:"Design a card UI component overlaid on extreme macro nature photography. The background is a razor-sharp macro shot of a water droplet on a leaf — the droplet acts as a lens showing an inverted miniature world inside it. Header in thin elegant white font: 'Micro Weather'. Body in small white text with subtle shadow for legibility: 'At this scale, every dewdrop is an ocean. Every petal holds a forecast. Nature already knows what the sky will do.' Two buttons as small frosted glass pills floating over the image: primary 'Zoom In', secondary 'Zoom Out'. The macro photography has extreme bokeh — creamy green background. Focus stacking for razor sharpness on the drop. Golden hour backlighting."},
  { n:"Persian Miniature", tag:"ORNATE", tagBg:"#0d948820", tagColor:"#2dd4bf",
    p:"Design a card UI component in Persian miniature painting (نگارگری) style. Gold-leafed background with an elaborate illuminated manuscript border in lapis lazuli blue, vermillion, and gold. Header in nastaliq calligraphy: 'پیش‌بینی آب و هوا' (Weather Forecast) — or English in a Persian-inspired decorative typeface: 'The Oracle Speaks'. Body in elegant calligraphy within a decorated text panel: 'The garden of paradise reveals itself when clouds part. Nightingales sing of tomorrow's warmth.' Two buttons as ornate cartouche shapes: primary in lapis blue with gold text 'Enter the Garden', secondary in lighter gold outline 'Close the Gate'. Ultra-fine brushwork. Isfahan School 16th century quality."},
  { n:"Indian Madhubani", tag:"TRIBAL", tagBg:"#ea580c20", tagColor:"#f97316",
    p:"Design a card UI component in Madhubani/Mithila folk art style. Every surface is densely decorated — no empty space exists. The card border is concentric line patterns in black ink. Header in bold decorated letterforms filled with cross-hatching: 'Weather Song'. Body text area is framed by fish-scale patterns and lotus motifs, text reads: 'The peacock dances when rain approaches. The lotus opens for the sun. Today, the lotus opens wide.' Two buttons are mandala-like circular designs: primary filled in turmeric yellow and vermillion red 'Dance', secondary in indigo blue outline 'Rest'. Peacock feather-eye patterns fill every corner. Black ink on white with bold primary color fills. Painted with bamboo stick on handmade paper."},
  { n:"African Tribal Pattern", tag:"BOLD", tagBg:"#b4540020", tagColor:"#f59e0b",
    p:"Design a card UI component using bold African tribal pattern aesthetics. The card background is divided into geometric sections — each filled with different patterns: chevrons, diamonds, zigzags, spirals in earth tones (terracotta, ochre, deep brown, chalk white). Header in bold sans-serif filled with Kente cloth pattern: 'Sky Message'. Body in clean white text on a dark brown band: 'The ancestors speak through the wind today. They say: go forth with confidence. The sky blesses your journey.' Two buttons as beaded-pattern rectangles: primary in bright ochre with brown text 'Journey', secondary in terracotta outline 'Wait'. Adinkra wisdom symbols in corners. Warm, rhythmic, celebratory."},
  { n:"Mexican Alebrije Folk Art", tag:"WILD", tagBg:"#e11d4820", tagColor:"#fb7185",
    p:"Design a card UI component in Mexican Alebrije folk art style. Explosively colorful card — every surface covered in intricate dot patterns and swirling designs in hot pink, electric blue, lime green, bright orange, and purple on a black background. Header in a decorative folk typeface: '¡El Tiempo!' with each letter painted a different vibrant color. Body in clean white text: 'The sky spirits dance in color today. They paint the clouds away with their brushes of light. ¡Que bonito!' Two buttons as fantastical shapes: primary is a winged creature shape in magenta 'Vamos!', secondary is a flower shape in turquoise 'Mañana'. Every empty space filled with microscopic painted details. Oaxacan artisan energy."},
  { n:"Vaporwave", tag:"AESTHETIC", tagBg:"#a855f720", tagColor:"#c084fc",
    p:"Design a card UI component in vaporwave aesthetic. The card floats over a pink-to-cyan gradient with a checkerboard tile floor stretching to infinity. Header in a retro Japanese-inspired font with pink-to-blue gradient: 'ウェザー (Weather)' or 'W E A T H E R' with full-width spaces. Body in a pixel font: 'Current conditions: A E S T H E T I C. Temperature: perfectly warm. Humidity: like a dream you can't remember.' Two buttons: primary is a Windows 95 dialog button 'OK', secondary is 'Cancel' in the same retro OS style. Roman column fragments frame the card. A dolphin silhouette leaps in the background. VHS scan lines overlay. Fiji water bottle hidden somewhere."},
  { n:"Glitch Art", tag:"ERROR", tagBg:"#ef444420", tagColor:"#f87171",
    p:"Design a card UI component being destroyed by digital glitch corruption. The left third of the card is clean and normal — white card, clean text. But corruption spreads from the right: pixel sorting stretches colors horizontally, RGB channels separate into red/green/blue ghost layers, JPEG artifacts create block distortion. Header starts clean 'Weather Re—' then glitches into corrupted data fragments. Body starts readable then dissolves: 'Clear skies expe—' into binary strings and displaced pixels. Two buttons: primary is intact 'Acc█pt', secondary is fully corrupted — unreadable colorful blocks. The beauty is in the destruction. QR code fragments appear in corrupted areas."},
  { n:"Low Poly 3D", tag:"FACETED", tagBg:"#06b6d420", tagColor:"#22d3ee",
    p:"Design a card UI component rendered as a low-polygon 3D object. The card is a flat rectangular prism with visible triangular faces — each face a slightly different shade of white/cream creating a faceted gem-like surface. Header in angular low-poly text extruded from the surface: 'POLY WEATHER'. Body as flat text mapped onto one face: 'Triangle count: 847. Cloud polygons: 0. Sun vertices: bright. Render time: now.' Two buttons are small geometric shapes on the card surface: primary is a blue icosahedron 'Render', secondary is a grey octahedron 'Quit'. Flat shading, no smooth normals. Wireframe partially visible. Ambient occlusion in creases. The card has 200 polygons. Cinema 4D viewport."},
  { n:"Isometric Illustration", tag:"PIXEL-PERFECT", tagBg:"#8b5cf620", tagColor:"#a78bfa",
    p:"Design a card UI component in isometric illustration style at perfect 30° angles. The card is an isometric rectangle floating in space with a tiny isometric scene built on top of it. Header 'Weather Island' is rendered in isometric 3D block letters. Body text is on a tiny isometric billboard within the scene: 'Population: 1. Weather: Clear. Mood: Perfect.' Two buttons are isometric buildings: primary is a tiny red house 'Home', secondary is a tiny blue office 'Work'. The card-island has isometric trees, a tiny koi pond, and a path connecting the buttons. Everything at precise isometric angles — no anti-aliasing. Clean flat colors with subtle face shading. Charming miniature world."},
  { n:"Be@rbrick Style", tag:"HYPE", tagBg:"#78716c20", tagColor:"#d6d3d1",
    p:"Design a card UI component as a Be@rbrick collector's authentication card. Premium heavy cardstock in matte black. Header in silver foil stamp: 'BE@RBRICK × WEATHER'. Body in small clean silver text: 'Series: Atmospheric Collection | Edition: 1/100 | Design: Clear Sky Variant | Material: ABS | Height: 1000%'. Two buttons as embossed elements: primary is a silver holographic rectangle 'Authenticate', secondary is a matte grey 'Transfer'. A QR code for verification. The Be@rbrick logo subtly watermarked in the background. Certificate number in foil at bottom. The card has the premium weight and feel of a luxury authentication document. Museum-grade collector's piece."},
  { n:"Funko Pop Style", tag:"COLLECT", tagBg:"#f59e0b20", tagColor:"#fbbf24",
    p:"Design a card UI component styled as the back of a Funko Pop box. White card with bold graphic styling. Header in the classic Funko Pop typeface: 'WEATHER DOLL'. Body shows a cartoon illustration of the figure with specification callouts: 'Height: 3.75 inches | Material: Vinyl | Exclusive: Weather Series #888 | Features: Glow-in-dark (Chase)'. Two buttons as collector action items: primary in Funko yellow 'Add to Collection', secondary in grey 'Trade'. Small thumbnails of other figures in the series at the bottom. Barcode and age warning. The card perfectly mimics authentic Funko packaging design."},
  { n:"Stop Motion Clay (Laika)", tag:"ANIMATED", tagBg:"#a3e63520", tagColor:"#a3e635",
    p:"Design a card UI component that looks like a prop from a Laika stop-motion film. The card is a tiny physical card made of miniature paper at 1:12 scale — you can see the fibrous texture of the handmade paper. Header is hand-lettered with a tiny brush in slightly wobbly text: 'Weather Report'. Body in miniature typewriter text (actual tiny typed letters): 'The forecast calls for clear skies. The puppet master has arranged the clouds to part by act three.' Two buttons are tiny paper tabs glued to the bottom: primary is a small red paper square 'Action', secondary is a cream square 'Cut'. An animator's enormous finger is visible at the frame edge for scale. Cinematic shallow depth of field. The card exists in a miniature world."},
  { n:"Rubber Hose Cartoon", tag:"1930s", tagBg:"#fde04720", tagColor:"#fde047",
    p:"Design a card UI component in 1930s rubber hose animation style. Sepia-tinted paper with film projector flicker effect. The card border is drawn with bouncy, stretchy cartoon lines. Header in a vintage cartoon title card font: 'SILLY WEATHER' with musical notes bouncing off the letters. Body in a playful hand-drawn font: 'Oh boy! The sun is shining and everything is swell! Even the clouds are smiling today! What a world!' Two buttons as cartoon gloved hands pointing: primary white-gloved hand pointing right 'SWELL!', secondary hand pointing down 'AW SHUCKS'. Everything is animated and alive — the border wiggles, the letters bounce, tiny cartoon eyes peek from the corners. Film grain and projector scratches. Ragtime piano energy."}
];

const grid = document.getElementById('grid');
const chipsEl = document.getElementById('chips');

STYLES.forEach((s, i) => {
  // Chip
  const chip = document.createElement('button');
  chip.className = 'chip';
  chip.innerHTML = `<span class="chip-num">${String(i+1).padStart(2,'0')}</span>${s.n}`;
  chip.onclick = () => {
    grid.children[i].scrollIntoView({ behavior: 'smooth', block: 'start' });
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
  };
  chipsEl.appendChild(chip);

  // Card
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <div class="card-head">
      <div class="card-num">${String(i+1).padStart(2,'0')}</div>
      <div class="card-tag" style="background:${s.tagBg};color:${s.tagColor}">${s.tag}</div>
    </div>
    <div class="card-body">
      <div class="card-title">${s.n}</div>
      <div class="prompt-box" data-prompt="${encodeURIComponent(s.p)}">${s.p}</div>
    </div>
  `;
  grid.appendChild(card);
});

// Scroll tracking
const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      const idx = Array.from(grid.children).indexOf(entry.target);
      if (idx >= 0) {
        document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
        const activeChip = chipsEl.children[idx];
        if (activeChip) {
          activeChip.classList.add('active');
          activeChip.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
        }
      }
    }
  });
}, { threshold: 0.5 });
Array.from(grid.children).forEach(card => observer.observe(card));

// Copy on tap
document.querySelectorAll('.prompt-box').forEach(box => {
  box.addEventListener('click', async () => {
    const text = decodeURIComponent(box.dataset.prompt);
    try {
      await navigator.clipboard.writeText(text);
      box.classList.add('copied');
      setTimeout(() => box.classList.remove('copied'), 2000);
    } catch {
      const ta = document.createElement('textarea');
      ta.value = text;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      box.classList.add('copied');
      setTimeout(() => box.classList.remove('copied'), 2000);
    }
  });
});
</script>
