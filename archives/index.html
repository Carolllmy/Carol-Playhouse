<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Carol's Playhouse</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html,body{background:#000;color:#fff;font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;width:100%;height:100%;overflow:hidden;cursor:none}
    *{cursor:none!important}
    .pigeon-cursor{position:fixed;width:64px;height:64px;pointer-events:none;z-index:9999;mix-blend-mode:difference;transform:translate(-16px,-8px)}
    .pigeon-cursor svg{width:100%;height:100%;fill:#fff}





    /* Title overlay during intro */
    .intro{position:fixed;inset:0;z-index:200;display:flex;align-items:center;justify-content:center;pointer-events:none}
    .intro-text{font-size:clamp(2rem,5vw,3.5rem);font-family:'Inter',system-ui,sans-serif;font-weight:700;letter-spacing:-.01em;opacity:0;transform:scale(.95);transition:opacity 1s cubic-bezier(.165,.84,.44,1),transform 1s cubic-bezier(.165,.84,.44,1)}
    .intro-text.show{opacity:1;transform:scale(1)}
    .intro-text.hide{opacity:0;filter:blur(12px);transition:opacity 1.8s ease,filter 1.8s ease}
    .intro-text .peach{color:#F7786B}

    /* Scrollable universe */
    .universe{width:100%;height:100%;overflow:scroll;-webkit-overflow-scrolling:touch;scrollbar-width:none;-ms-overflow-style:none}
    .universe::-webkit-scrollbar{display:none}
    .board{position:relative}

    /* Tiles */
    .tile{position:absolute;cursor:none;will-change:transform;transition:transform .4s cubic-bezier(.165,.84,.44,1)}
    .tile:hover{z-index:10;transform:scale(1.2)!important}
    .tile:focus-visible{outline:3px solid #fff;outline-offset:4px;z-index:12}
    .tile canvas{display:block;width:100%;height:100%;border-radius:inherit}

    /* Shapes */
    .shape-card{border-radius:20px;overflow:hidden}
    .shape-circle{border-radius:50%;overflow:hidden}
    .shape-tilt{border-radius:20px;overflow:hidden;transform:rotate(-4deg)}
    .shape-tilt:hover{transform:rotate(-2deg) scale(1.2)!important}
    .shape-blob{border-radius:30% 70% 70% 30%/30% 30% 70% 70%;overflow:hidden}
    .shape-arch{border-radius:50% 50% 10px 10px;overflow:hidden}
    .shape-diamond{border-radius:16px;overflow:hidden;transform:rotate(3deg)}
    .shape-diamond:hover{transform:rotate(1deg) scale(1.2)!important}

    /* Intro animation: tiles start hidden, fade in with blur-to-clear */
    .tile{opacity:0;filter:blur(16px);transform:translate(0,0) scale(.85)}
    .tile.spread{opacity:1;filter:blur(0px);transform:scale(1);transition:opacity 1s ease,filter 1.2s ease,transform 1s cubic-bezier(.165,.84,.44,1)}

    /* Expanding preview */
    .preview{position:fixed;inset:0;z-index:500;background:#000;opacity:0;pointer-events:none;transition:opacity .6s cubic-bezier(.165,.84,.44,1)}
    .preview.open{opacity:1;pointer-events:all}
    .preview iframe{width:100%;height:100%;border:none;opacity:0;transition:opacity .45s ease}
    .preview iframe.ready{opacity:1}
    .pv-veil{position:absolute;inset:0;background:linear-gradient(110deg,rgba(255,255,255,.04) 20%,rgba(255,255,255,.12) 45%,rgba(255,255,255,.04) 70%);background-size:220% 100%;animation:pvShimmer 1.1s linear infinite}
    .sr-only{position:absolute!important;width:1px!important;height:1px!important;padding:0!important;margin:-1px!important;overflow:hidden!important;clip:rect(0,0,0,0)!important;white-space:nowrap!important;border:0!important}
    @keyframes pvShimmer{0%{background-position:100% 0}100%{background-position:-100% 0}}
    .grid-btn{position:fixed;left:50%;bottom:max(18px, env(safe-area-inset-bottom) + 12px);transform:translateX(-50%);z-index:600;display:flex;align-items:center;justify-content:center;gap:8px;padding:12px 16px;border-radius:999px;border:none;background:rgba(80,80,80,0.78);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);color:#fff;font-size:12px;font-weight:700;font-family:'Inter',sans-serif;letter-spacing:.02em;text-transform:none;opacity:0;pointer-events:none;transition:opacity .25s,transform .25s cubic-bezier(.165,.84,.44,1),background .2s;cursor:pointer;box-shadow:0 10px 24px rgba(0,0,0,.35)}
    .grid-btn.show{opacity:1;pointer-events:all;transform:translateX(-50%) translateY(0)}
    .grid-btn:hover{background:rgba(110,110,110,0.88);transform:translateX(-50%) translateY(-2px)}
    .grid-btn svg{width:16px;height:16px;fill:#fff}
    .header{position:fixed;top:0;left:0;right:0;z-index:100;text-align:center;padding:20px;font-size:15px;font-family:'Inter',sans-serif;font-weight:700;letter-spacing:.01em;pointer-events:none;mix-blend-mode:difference;opacity:0;transition:opacity 0.5s}
    .disc{position:fixed;bottom:0;left:0;right:0;text-align:center;font-size:10px;color:rgba(255,255,255,.2);padding:10px;z-index:50;pointer-events:none}

    @media (max-width: 768px) {
      .grid-btn {
        padding: 10px 14px;
        font-size: 11px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .intro-text,.tile,.tile.spread,.grid-btn,.preview iframe,.pv-veil{transition:none!important;animation:none!important}
      .tile:hover,.shape-tilt:hover,.shape-diamond:hover{transform:none!important}
      .pigeon-cursor{display:none}
      html,body,.tile{cursor:auto!important}
    }
  </style>
</head>
<body>

<div class="header">Carol's Playhouse</div>
<div class="pigeon-cursor" id="pigeon">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="-5 -10 110 135"><path d="m71.906 9.8672c-5.5859 0.12891-10.102 2.7461-11.926 11.098-1.4883 6.8086 0.73047 11.258-2.4336 16.883-1.125 2-2.1055 1.8984-5.8594 3.1719-5.7969 1.9609-13.133 7.543-20.883 16.391-7.3516 8.3945-15.59 10.375-15.43 11.836 0.15625 1.4609 6.957 1.9102 12.055 1.8906l-13.273 9.2188s-0.88672 0.73828 0 1.4727c0.88672 0.73828 3.6875 2.6523 7.5938 2.5781s10.395-3.832 12.387-5.0117c1.9922-1.1797 3.832-2.9492 8.2578-2.9492 1.3125 0 3.3164 0.13672 5.6836 0.20313 0.47656 0.75781 1.1953 2.1602 1.9648 4.5859 1.3555 4.2734 2.3984 4.9023 1.25 5.5273-1.1484 0.625-3.4844 1.0703-3.6992 2.5547-0.15625 1.0703 1.043 0.78125 1.043 0.78125l25.023-0.046875s1.875 0.050781 0.98828-1.3047c-0.88672-1.3555-3.0234-2.3477-4.6406-2.3984-1.6172-0.050781-3.9609 0-4.3242-0.20703-0.36328-0.20703-4.1211-6.8828-3.2852-8.5508 0.57422-1.1523 0.82812-2.082 2.0977-3.2148 0.77344-0.33984 1.5195-0.72656 2.2266-1.1719 7.668-4.793 14.082-9.8086 15.188-19.246 1.1055-9.4375-2.6562-15.188-4.2031-18.656-1.5469-3.4648-2.9023-9.1758-0.29688-11.312 2.6055-2.1367 7.3008-0.46875 7.9258-0.52344 0.625-0.050782 1.3477-0.015625 0.53516-1.1953-0.8125-1.1797-2.082-2.7852-3.3555-3.2266-1.2734-0.44141-2.7109-1.4375-2.6172-2.6367s-2.4141-6.6719-8-6.543zm1.3789 5.6953v-0.003906c0.82812 0 1.5 0.67188 1.5 1.5s-0.67188 1.5-1.5 1.5-1.5-0.67188-1.5-1.5 0.67188-1.5 1.5-1.5zm-16.227 60.746c-0.015625 0.72656 0.12109 1.5078 0.49219 2.3242 1.3047 2.8672 3.7031 7.7148 3.7031 7.7148h-4.7461s-0.88281-1.0078-2.3984-6.6211c-0.38672-1.4414 0.39844-2.5 1.6016-3.2695 0.44531-0.042969 0.89844-0.089843 1.3438-0.14844z"/></svg>
</div>
<div class="intro" id="intro">
  <div class="intro-text" id="introText">Carol's <span class="peach">Playhouse</span></div>
</div>

<div class="universe" id="universe">
  <div class="board" id="board"></div>
</div>

<button class="grid-btn" id="gridBtn">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="-5 -10 110 135" width="18" height="18" fill="#fff"><path d="m71.906 9.8672c-5.5859 0.12891-10.102 2.7461-11.926 11.098-1.4883 6.8086 0.73047 11.258-2.4336 16.883-1.125 2-2.1055 1.8984-5.8594 3.1719-5.7969 1.9609-13.133 7.543-20.883 16.391-7.3516 8.3945-15.59 10.375-15.43 11.836 0.15625 1.4609 6.957 1.9102 12.055 1.8906l-13.273 9.2188s-0.88672 0.73828 0 1.4727c0.88672 0.73828 3.6875 2.6523 7.5938 2.5781s10.395-3.832 12.387-5.0117c1.9922-1.1797 3.832-2.9492 8.2578-2.9492 1.3125 0 3.3164 0.13672 5.6836 0.20313 0.47656 0.75781 1.1953 2.1602 1.9648 4.5859 1.3555 4.2734 2.3984 4.9023 1.25 5.5273-1.1484 0.625-3.4844 1.0703-3.6992 2.5547-0.15625 1.0703 1.043 0.78125 1.043 0.78125l25.023-0.046875s1.875 0.050781 0.98828-1.3047c-0.88672-1.3555-3.0234-2.3477-4.6406-2.3984-1.6172-0.050781-3.9609 0-4.3242-0.20703-0.36328-0.20703-4.1211-6.8828-3.2852-8.5508 0.57422-1.1523 0.82812-2.082 2.0977-3.2148 0.77344-0.33984 1.5195-0.72656 2.2266-1.1719 7.668-4.793 14.082-9.8086 15.188-19.246 1.1055-9.4375-2.6562-15.188-4.2031-18.656-1.5469-3.4648-2.9023-9.1758-0.29688-11.312 2.6055-2.1367 7.3008-0.46875 7.9258-0.52344 0.625-0.050782 1.3477-0.015625 0.53516-1.1953-0.8125-1.1797-2.082-2.7852-3.3555-3.2266-1.2734-0.44141-2.7109-1.4375-2.6172-2.6367s-2.4141-6.6719-8-6.543z"/></svg>
  BACK HOME
</button>

<div class="disc">built with 💜</div>

<script>
const H=location.hostname;
const reduceMotion=window.matchMedia('(prefers-reduced-motion: reduce)').matches;
const P=[
  {id:'pet-house',e:'🏠',n:"Bonnie's Pet House",d:'Math + spelling, kawaii pets',h:'/bonnies-pet-house.html',ok:1},
  {id:'note-master',e:'🎹',n:'Note Master',d:'Piano memory, Yamaha C5 Grand',h:'/note-master.html',ok:1},
  {id:'paws-mail',e:'🐾',n:'Paws Mail',d:'5 animals × 5 colors, desktop pets',h:'https://github.com/Carolllmy/paws-mail',ok:1,external:1},
  {id:'copy-raccoon',e:'🦝',n:'Copy Raccoon',d:'Clone & edit any webpage',h:'https://github.com/Carolllmy/copy-raccoon',ok:1,external:1},
  {id:'perler-beads',e:'🫙',n:'Perler Beads',d:'Digital 拼豆 bead studio',h:'/perler-beads.html',ok:1},
  {id:'lunch-royale',e:'🍱',n:'Lunch Royale',d:'Fortnite lunchbox packing',h:'/lunch-royale.html',ok:1},
  {id:'depthflow-parallax',e:'🌀',n:'DepthFlow Parallax',d:'Shader-based depth reprojection + tilt',h:'/depthflow-parallax.html',ok:1},
  {id:'immersive-ui-effects-lab',e:'✨',n:'Immersive UI Effects Lab',d:'Interactive premium UI effects gallery (Gary mode)',h:'/immersive-ui-effects-lab',ok:1},
  {id:'immersive-motion-lab',e:'🌊',n:'Immersive Motion Lab',d:'Turn any static image into animated depth motion',h:'/immersive-motion-lab.html',ok:1},
];

// Grid positions relative to center (0,0) — col,row offsets
// Tile 0 (Pet House) is at center. Others spread around it.
// [colOffset, rowOffset, width, height, shape]
const GAP = 30;
const CELL = 160;

const G=[
  { col:0,  row:0,  w:140, h:175, shape:'shape-card'},     // Pet House — CENTER
  { col:-1, row:-1, w:120, h:120, shape:'shape-circle'},    // Note Master — top-left, circle
  { col:1,  row:-1, w:155, h:110, shape:'shape-arch'},      // Paws Mail — top-right, arch
  { col:-2, row:0,  w:125, h:155, shape:'shape-tilt'},      // Copy Raccoon — far left, tilted
  { col:2,  row:0,  w:110, h:130, shape:'shape-blob'},      // Perler Beads — far right, blob
  { col:-1, row:1,  w:165, h:105, shape:'shape-diamond'},   // Lunch Royale — bottom-left, diamond
  { col:1,  row:1,  w:160, h:110, shape:'shape-arch'},      // DepthFlow Parallax — lower right
  { col:0,  row:2,  w:170, h:115, shape:'shape-card'},      // Story Time — bottom center
  { col:2,  row:2,  w:175, h:120, shape:'shape-blob'},      // Immersive Motion Lab — bottom right
];

const board=document.getElementById('board');
const universe=document.getElementById('universe');

// Calculate board size and center offset
const colMin=Math.min(...G.map(g=>g.col)), colMax=Math.max(...G.map(g=>g.col));
const rowMin=Math.min(...G.map(g=>g.row)), rowMax=Math.max(...G.map(g=>g.row));
const PADDING=200;

// Convert grid coords to pixel positions
function gridToPixel(g){
  return {
    x: g.col*(CELL+GAP),
    y: g.row*(CELL+GAP)
  };
}

// Find bounding box
let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
G.forEach(g=>{
  const p=gridToPixel(g);
  minX=Math.min(minX,p.x-g.w/2);
  minY=Math.min(minY,p.y-g.h/2);
  maxX=Math.max(maxX,p.x+g.w/2);
  maxY=Math.max(maxY,p.y+g.h/2);
});

const boardW=maxX-minX+PADDING*2;
const boardH=maxY-minY+PADDING*2;
board.style.width=boardW+'px';
board.style.height=boardH+'px';

// Center point in board coordinates
const centerX=-minX+PADDING;
const centerY=-minY+PADDING;

// Store tile elements and their final positions
const tiles=[];

P.forEach((p,i)=>{
  const g=G[i];
  const pos=gridToPixel(g);
  const finalX=centerX+pos.x-g.w/2;
  const finalY=centerY+pos.y-g.h/2;

  const tile=document.createElement('div');
  tile.className='tile '+g.shape;
  tile.style.width=g.w+'px';
  tile.style.height=g.h+'px';
  // Start at center (Pet House position)
  tile.style.left=finalX+'px';
  tile.style.top=finalY+'px';
  tile.dataset.i=i;
  tile.setAttribute('role','button');
  tile.setAttribute('tabindex','0');
  tile.setAttribute('aria-label',`${p.n}: ${p.d}`);

  const cvs=document.createElement('canvas');
  cvs.width=g.w*2;cvs.height=g.h*2;
  cvs.style.width=g.w+'px';cvs.style.height=g.h+'px';
  tile.appendChild(cvs);

  tile.addEventListener('click',()=>openOv(i));
  tile.addEventListener('keydown',(e)=>{
    if(e.key==='Enter'||e.key===' '){e.preventDefault();openOv(i)}
  });
  board.appendChild(tile);

  tiles.push({el:tile,cvs,ctx:cvs.getContext('2d'),w:g.w,h:g.h,finalX,finalY,i});
});

// ── Intro sequence ──
const introText=document.getElementById('introText');
const introEl=document.getElementById('intro');

function revealTiles(stagger=true){
  introEl.style.display='none';
  document.querySelector('.header').style.opacity='1';
  const sorted=[...tiles.map((t,idx)=>({t,idx}))];
  sorted.sort((a,b)=>{
    const da=Math.sqrt(G[a.t.i].col**2+G[a.t.i].row**2);
    const db=Math.sqrt(G[b.t.i].col**2+G[b.t.i].row**2);
    return da-db;
  });
  sorted.forEach((s,order)=>{
    const show=()=>{
      s.t.el.classList.add('spread');
      startAnim(s.t);
    };
    stagger ? setTimeout(show,order*250) : show();
  });
}

if(reduceMotion){
  const vw=window.innerWidth,vh=window.innerHeight;
  universe.scrollLeft=centerX-vw/2;
  universe.scrollTop=centerY-vh/2;
  revealTiles(false);
}else{
  // Step 1: Show title
  setTimeout(()=>introText.classList.add('show'),100);

  // Step 2: Fade out title text
  setTimeout(()=>{
    introText.classList.add('hide');
    const vw=window.innerWidth,vh=window.innerHeight;
    universe.scrollLeft=centerX-vw/2;
    universe.scrollTop=centerY-vh/2;
  },1800);

  // Step 3: After text fully fades, show tiles one by one
  setTimeout(()=>revealTiles(true),3800);
}

// ── Pigeon cursor ──
const pigeon=document.getElementById('pigeon');
document.addEventListener('mousemove',e=>{
  pigeon.style.left=e.clientX+'px';
  pigeon.style.top=e.clientY+'px';
});
// Hide on touch devices
if('ontouchstart' in window)pigeon.style.display='none';

// ── Canvas Animations ──
function startAnim(t){
  const ctx=t.ctx;
  ctx.scale(2,2);
  const w=t.w,h=t.h;
  if(reduceMotion){
    anims[t.i](ctx,w,h,0);
    return;
  }
  const draw=()=>{
    anims[t.i](ctx,w,h,performance.now()/1000);
    requestAnimationFrame(draw);
  };
  draw();
}

function roundRect(ctx,x,y,w,h,r){
  if(typeof r==='number')r={tl:r,tr:r,bl:r,br:r};
  ctx.beginPath();
  ctx.moveTo(x+r.tl,y);ctx.lineTo(x+w-r.tr,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r.tr);
  ctx.lineTo(x+w,y+h-r.br);ctx.quadraticCurveTo(x+w,y+h,x+w-r.br,y+h);
  ctx.lineTo(x+r.bl,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r.bl);
  ctx.lineTo(x,y+r.tl);ctx.quadraticCurveTo(x,y,x+r.tl,y);ctx.closePath();
}

const anims=[
  // 0: Pet House — bouncing kawaii pets + floating hearts
  (ctx,w,h,t)=>{
    ctx.fillStyle='#FFE0E8';ctx.fillRect(0,0,w,h);
    ctx.fillStyle='#FFD0D8';ctx.fillRect(0,h*.7,w,h*.3);
    // House
    const hx=w*.3,hy=h*.22,hw=w*.4,hh=h*.28;
    ctx.fillStyle='#F7786B';ctx.beginPath();ctx.moveTo(hx,hy);ctx.lineTo(hx+hw/2,hy-hw*.35);ctx.lineTo(hx+hw,hy);ctx.fill();
    ctx.fillStyle='#fff';ctx.fillRect(hx,hy,hw,hh);
    ctx.fillStyle='#F7786B';ctx.fillRect(hx+hw*.38,hy+hh*.35,hw*.24,hh*.65);
    // Window
    ctx.fillStyle='#B5E0FF';ctx.fillRect(hx+hw*.08,hy+hh*.15,hw*.2,hw*.2);
    ctx.fillRect(hx+hw*.72,hy+hh*.15,hw*.2,hw*.2);
    // Bouncing pets
    for(let i=0;i<3;i++){
      const px=w*.18+i*w*.28,py=h*.65+Math.sin(t*3+i*2.1)*10,s=w*.055;
      const c=['#FFB0C0','#B0D0FF','#C0FFB5'][i];
      ctx.fillStyle=c;ctx.beginPath();ctx.arc(px,py,s,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(px-s*.6,py-s*.8,s*.4,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(px+s*.6,py-s*.8,s*.4,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#333';
      ctx.beginPath();ctx.arc(px-s*.25,py-s*.1,s*.1,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(px+s*.25,py-s*.1,s*.1,0,Math.PI*2);ctx.fill();
    }
    for(let i=0;i<5;i++){
      const ht=((t*.5+i*1.3)%3)/3,hx2=w*.12+i*w*.19,hy2=h*.55-ht*h*.35;
      ctx.globalAlpha=1-ht;ctx.fillStyle='#F7786B';ctx.font=(10+i*2)+'px sans-serif';ctx.fillText('♥',hx2,hy2);
    }
    ctx.globalAlpha=1;
  },

  // 1: Note Master — piano keys + floating notes
  (ctx,w,h,t)=>{
    ctx.fillStyle='#0a0a14';ctx.fillRect(0,0,w,h);
    const cx=w/2,cy=h/2;
    const g=ctx.createRadialGradient(cx,cy,0,cx,cy,w*.45);
    g.addColorStop(0,'rgba(124,111,255,0.2)');g.addColorStop(1,'transparent');
    ctx.fillStyle=g;ctx.fillRect(0,0,w,h);
    const kw=w*.065,kh=h*.28,kx=cx-3.5*kw,ky=cy+10;
    for(let i=0;i<7;i++){
      const active=Math.floor((t*2)%7)===i;
      ctx.fillStyle=active?'#7C6FFF':'#eee';
      if(active){ctx.shadowColor='#7C6FFF';ctx.shadowBlur=15}
      ctx.fillRect(kx+i*kw+1,ky,kw-2,kh);
      ctx.shadowBlur=0;
    }
    for(let i of[0,1,3,4,5]){ctx.fillStyle='#222';ctx.fillRect(kx+i*kw+kw*.55,ky,kw*.55,kh*.55)}
    for(let i=0;i<8;i++){
      const nt=((t*.7+i*1.1)%4)/4;
      ctx.globalAlpha=1-nt;ctx.fillStyle='#7C6FFF';ctx.font='14px sans-serif';
      ctx.fillText(['♪','♫','♩'][i%3],w*.15+i*w*.1+Math.sin(t+i)*6,cy-nt*h*.4);
    }
    ctx.globalAlpha=1;
  },

  // 2: Paws Mail — cat carrying envelope in circle
  (ctx,w,h,t)=>{
    ctx.fillStyle='#FFF0E0';ctx.fillRect(0,0,w,h);
    ctx.strokeStyle='#FFE0C8';ctx.setLineDash([3,5]);ctx.lineWidth=1.5;
    ctx.beginPath();ctx.arc(w/2,h/2,Math.min(w,h)*.3,0,Math.PI*2);ctx.stroke();
    ctx.setLineDash([]);
    const a=t*1.2,r=Math.min(w,h)*.3,cx=w/2+Math.cos(a)*r,cy=h/2+Math.sin(a)*r;
    ctx.fillStyle='#FB923C';
    ctx.beginPath();ctx.ellipse(cx,cy,13,9,a+Math.PI/2,0,Math.PI*2);ctx.fill();
    const hx=cx+Math.cos(a)*11,hy=cy+Math.sin(a)*11;
    ctx.beginPath();ctx.arc(hx,hy,7,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(hx+Math.cos(a-.5)*5,hy+Math.sin(a-.5)*5,3.5,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(hx+Math.cos(a+.5)*5,hy+Math.sin(a+.5)*5,3.5,0,Math.PI*2);ctx.fill();
    const ex=cx-Math.cos(a)*7,ey=cy-Math.sin(a)*7-10;
    ctx.fillStyle='#fff';ctx.fillRect(ex-7,ey-4,14,8);
    ctx.strokeStyle='#FB923C';ctx.lineWidth=.8;
    ctx.beginPath();ctx.moveTo(ex-7,ey-4);ctx.lineTo(ex,ey+1);ctx.lineTo(ex+7,ey-4);ctx.stroke();
    for(let i=1;i<5;i++){
      const pa=a-i*.4;ctx.globalAlpha=.12*(1-i/5);ctx.fillStyle='#FB923C';
      ctx.beginPath();ctx.arc(w/2+Math.cos(pa)*r,h/2+Math.sin(pa)*r,2.5,0,Math.PI*2);ctx.fill();
    }
    ctx.globalAlpha=1;
  },

  // 3: Copy Raccoon — browser cloning
  (ctx,w,h,t)=>{
    ctx.fillStyle='#E8FFF0';ctx.fillRect(0,0,w,h);
    const bx=w*.1,by=h*.12,bw=w*.42,bh=h*.5;
    ctx.fillStyle='#fff';roundRect(ctx,bx,by,bw,bh,6);ctx.fill();
    ctx.strokeStyle='#ddd';ctx.lineWidth=1;roundRect(ctx,bx,by,bw,bh,6);ctx.stroke();
    ctx.fillStyle='#f5f5f5';ctx.fillRect(bx,by,bw,16);
    ctx.fillStyle='#ccc';[8,16,24].forEach(dx=>{ctx.beginPath();ctx.arc(bx+dx,by+8,2.5,0,Math.PI*2);ctx.fill()});
    for(let i=0;i<3;i++){ctx.fillStyle=i===0?'#34D399':'#e5e5e5';ctx.fillRect(bx+8,by+22+i*10,bw*(.5+Math.random()*.3),4)}
    const sl=Math.sin(t*1.5)*.5+.5;
    ctx.globalAlpha=.7+sl*.3;
    const c2x=bx+bw*.35+sl*w*.2,c2y=by+sl*h*.12;
    ctx.fillStyle='#fff';ctx.strokeStyle='#34D399';ctx.lineWidth=2;roundRect(ctx,c2x,c2y,bw,bh,6);ctx.fill();ctx.stroke();
    ctx.fillStyle='#f5f5f5';ctx.fillRect(c2x,c2y,bw,16);
    for(let i=0;i<3;i++){ctx.fillStyle=i===0?'#34D399':'#e5e5e5';ctx.fillRect(c2x+8,c2y+22+i*10,bw*(.5+Math.random()*.3),4)}
    ctx.globalAlpha=1;
    // Raccoon paw
    ctx.fillStyle='#8B7355';ctx.beginPath();ctx.ellipse(c2x+bw-8,c2y-4,15,10,-.3,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#6B5335';[0,1,2].forEach(i=>{ctx.beginPath();ctx.arc(c2x+bw-18+i*7,c2y-14,4,0,Math.PI*2);ctx.fill()});
  },

  // 4: Perler Beads — beads falling onto pegboard
  (ctx,w,h,t)=>{
    ctx.clearRect(0,0,w,h);ctx.fillStyle='#0a0a0a';ctx.fillRect(0,0,w,h);
    const gs=10,cols=Math.floor(w/gs),rows=Math.floor(h/gs);
    ctx.fillStyle='#1a1a1a';
    for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){ctx.beginPath();ctx.arc(c*gs+gs/2,r*gs+gs/2,1.2,0,Math.PI*2);ctx.fill()}
    const colors=['#EC4899','#F7786B','#7C6FFF','#34D399','#38BDF8','#EAB308','#FB923C'];
    const placed=Math.floor((t*4)%60);
    for(let i=0;i<placed;i++){
      const seed=i*7919;
      const bc=Math.floor(w/2)-4*gs+((seed%8))*gs;
      const br=h-gs*2-Math.floor((seed/10)%6)*gs;
      ctx.fillStyle=colors[i%colors.length];
      ctx.beginPath();ctx.arc(bc+gs/2,br+gs/2,gs*.38,0,Math.PI*2);ctx.fill();
    }
    const fy=(t*70)%h,fx=w/2+Math.sin(t*2.5)*25;
    ctx.fillStyle=colors[Math.floor(t)%colors.length];
    ctx.shadowColor=ctx.fillStyle;ctx.shadowBlur=8;
    ctx.beginPath();ctx.arc(fx,fy,gs*.42,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
  },

  // 5: Lunch Royale — food bouncing into lunchbox
  (ctx,w,h,t)=>{
    ctx.fillStyle='#FFF8E0';ctx.fillRect(0,0,w,h);
    const lx=w*.15,ly=h*.3,lw=w*.7,lh=h*.5;
    ctx.fillStyle='#EAB308';roundRect(ctx,lx,ly,lw,lh,8);ctx.fill();
    ctx.fillStyle='#D4A006';ctx.fillRect(lx,ly,lw,6);
    ctx.fillStyle='#D4A006';ctx.fillRect(lx+lw*.33,ly+6,2,lh-6);ctx.fillRect(lx+lw*.66,ly+6,2,lh-6);
    const foods=['🍙','🥦','🍳','🍎','🥕','🍗'];
    for(let i=0;i<foods.length;i++){
      const ft=((t*.7+i*.8)%4);
      const fx=lx+15+(i%3)*(lw/3);
      const fy=ft<1?ly-25+ft*50:ly+25+Math.sin(ft*3)*4;
      ctx.font='20px sans-serif';ctx.fillText(foods[i],fx,fy);
    }
    for(let i=0;i<4;i++){
      const sy=ly-8-((t*25+i*18)%35);
      ctx.globalAlpha=1-((t*25+i*18)%35)/35;
      ctx.fillStyle='#EAB308';ctx.font='8px sans-serif';ctx.fillText('✦',lx+lw*.15+i*lw*.25,sy);
    }
    ctx.globalAlpha=1;
  },

  // 6: DepthFlow Parallax — neon depth waves
  (ctx,w,h,t)=>{
    const g=ctx.createLinearGradient(0,0,w,h);
    g.addColorStop(0,'#0b1020');g.addColorStop(1,'#1a0f35');
    ctx.fillStyle=g;ctx.fillRect(0,0,w,h);
    for(let i=0;i<7;i++){
      const y=h*.2+i*h*.1+Math.sin(t*1.5+i)*8;
      ctx.strokeStyle=`hsla(${200+i*25},90%,65%,${0.25+i*0.05})`;
      ctx.lineWidth=2+i*.3;
      ctx.beginPath();
      for(let x=0;x<=w;x+=8){
        ctx.lineTo(x,y+Math.sin((x*.02)+(t*2)+i)*7);
      }
      ctx.stroke();
    }
    const cx=w*.5+Math.sin(t)*18,cy=h*.55+Math.cos(t*1.3)*12;
    const rg=ctx.createRadialGradient(cx,cy,0,cx,cy,42);
    rg.addColorStop(0,'rgba(124,111,255,.9)');rg.addColorStop(1,'rgba(124,111,255,0)');
    ctx.fillStyle=rg;ctx.fillRect(cx-45,cy-45,90,90);
  },

  // 7: Immersive Motion Lab — floating artwork + depth grid
  (ctx,w,h,t)=>{
    const g=ctx.createLinearGradient(0,0,w,h);
    g.addColorStop(0,'#101935'); g.addColorStop(1,'#070b18');
    ctx.fillStyle=g; ctx.fillRect(0,0,w,h);

    // faux depth grid
    ctx.strokeStyle='rgba(130,160,255,0.22)';
    ctx.lineWidth=1;
    for(let i=0;i<8;i++){
      const y = h*0.15 + i*h*0.1 + Math.sin(t*1.2+i)*2;
      ctx.beginPath();
      for(let x=0;x<=w;x+=8) ctx.lineTo(x, y + Math.sin(x*0.03 + t*2)*2);
      ctx.stroke();
    }

    // album plate wobble
    const cx=w*0.5 + Math.sin(t*1.1)*10;
    const cy=h*0.52 + Math.cos(t*1.4)*8;
    const pw=w*0.55, ph=h*0.62;
    ctx.save();
    ctx.translate(cx,cy);
    ctx.rotate(Math.sin(t*0.9)*0.04);
    const rg=ctx.createLinearGradient(-pw/2,-ph/2,pw/2,ph/2);
    rg.addColorStop(0,'#ff7a95'); rg.addColorStop(1,'#7c6fff');
    ctx.fillStyle=rg;
    roundRect(ctx,-pw/2,-ph/2,pw,ph,16); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.22)';
    roundRect(ctx,-pw*0.42,-ph*0.38,pw*0.84,ph*0.18,10); ctx.fill();
    ctx.restore();
  },

];

// ── Expanding Preview ──
const preview=document.getElementById('preview');
const gridBtn=document.getElementById('gridBtn');
let activePreviewTimer=null;

function openOv(i){
  const p=P[i];
  if(!p.h) return;
  let href=p.h;
  if(href&&href.includes('localhost'))href=href.replace('localhost',H);

  // External pages (e.g., GitHub) should open directly, not in iframe.
  if(p.external || /^https?:\/\//.test(href)){
    window.open(href,'_blank','noopener,noreferrer');
    return;
  }

  preview.innerHTML=`<div class="pv-veil" id="pvVeil" aria-hidden="true"></div><div class="sr-only" id="pvAnnounce" aria-live="polite">Opening project preview</div><iframe id="pvFrame" src="${href}" allowfullscreen title="Project preview"></iframe>`;
  const frame=document.getElementById('pvFrame');
  const veil=document.getElementById('pvVeil');
  const announce=document.getElementById('pvAnnounce');
  activePreviewTimer=setTimeout(()=>{
    if(announce) announce.textContent='Preview took too long. Opening project directly.';
    window.open(href,'_blank','noopener,noreferrer');
    closePreview();
  },6000);
  frame?.addEventListener('load',()=>{
    if(activePreviewTimer){clearTimeout(activePreviewTimer);activePreviewTimer=null;}
    frame.classList.add('ready');
    setTimeout(()=>veil?.remove(),220);
    if(announce) announce.textContent='Project preview loaded';
  });

  preview.classList.add('open');
  gridBtn.classList.add('show');
  document.querySelector('.header').style.opacity='0';
  document.querySelector('.disc').style.opacity='0';
  pigeon.style.display='none';
}

function closePreview(){
  if(activePreviewTimer){clearTimeout(activePreviewTimer);activePreviewTimer=null;}
  preview.classList.remove('open');
  gridBtn.classList.remove('show');
  document.querySelector('.header').style.opacity='';
  document.querySelector('.disc').style.opacity='';
  pigeon.style.display='';
  // Remove iframe after transition
  setTimeout(()=>{preview.innerHTML=''},600);
}

gridBtn.addEventListener('click',closePreview);
document.onkeydown=e=>{if(e.key==='Escape')closePreview()};
</script>
